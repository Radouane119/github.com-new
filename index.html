<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex, Crypto & Gold Trading Ideas</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0b1117;color:#e6edf3;min-height:100vh;-webkit-font-smoothing:antialiased}
#root{max-width:1180px;margin:0 auto;padding:20px 24px 48px}
/* topbar */
.topbar{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px}
.topbar h1{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;color:#f0f4f8}
.eyebrow{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#73808d;margin-bottom:2px}
.pair-controls{display:flex;align-items:center;gap:10px;background:#141c26;padding:8px 12px;border-radius:10px;border:1px solid #1f2a36}
.select-wrap{position:relative;display:inline-flex;align-items:center;gap:6px}
.select-wrap span{font-size:.75rem;color:#8c98a5;white-space:nowrap}
.select-wrap select{appearance:none;background:transparent;border:none;color:#e6edf3;font-size:.85rem;font-weight:500;padding:4px 18px 4px 4px;cursor:pointer;font-family:inherit;outline:none;min-width:48px}
.select-wrap select:focus{color:#8dd7ff}
.select-wrap::after{content:"▾";position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:.6rem;color:#73808d;pointer-events:none}
.icon-button{background:transparent;border:1px solid #1f2a36;color:#8c98a5;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.icon-button:hover{background:#1f2a36;color:#e6edf3}
.icon-button:disabled{opacity:.3;cursor:not-allowed}
.icon-button:disabled:hover{background:transparent;color:#8c98a5}
/* summary grid */
.summary-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:720px){.summary-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.summary-grid{grid-template-columns:1fr}}
.signal-panel{background:#141c26;border-radius:12px;padding:16px 20px;border:1px solid #1f2a36;border-left:4px solid #73808d}
.signal-panel.buy{border-left-color:#2ea043}
.signal-panel.sell{border-left-color:#da3633}
.signal-panel.wait{border-left-color:#b58cff}
.panel-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#73808d;margin-bottom:4px}
.signal-row{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
.signal-row span{font-size:1.55rem;font-weight:700;letter-spacing:-.03em}
.buy .signal-row span{color:#3fb950}
.sell .signal-row span{color:#f85149}
.wait .signal-row span{color:#b58cff}
.signal-row small{color:#8c98a5;font-size:.8rem;font-weight:500}
.signal-panel p{font-size:.78rem;color:#8c98a5;line-height:1.4}
.metric{background:#141c26;border-radius:12px;padding:16px 20px;border:1px solid #1f2a36;display:flex;flex-direction:column;gap:2px}
.metric span{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#73808d}
.metric strong{font-size:1.25rem;font-weight:600;color:#f0f4f8}
/* notices */
.notice{background:#141c26;border-radius:10px;padding:12px 18px;font-size:.78rem;color:#73808d;border:1px solid #1f2a36;margin-bottom:16px;line-height:1.5}
.notice.error{color:#f85149;border-color:#da3633}
.source-line{font-size:.7rem;color:#5c6a7a;margin-bottom:18px}
/* workspace */
.workspace{display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:24px}
@media(max-width:900px){.workspace{grid-template-columns:1fr}}
.chart-panel{background:#10171f;border-radius:12px;border:1px solid #1f2a36;padding:18px}
.chart-panel .section-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.chart-panel .section-head span{font-size:.78rem;color:#5c6a7a}
.chart-panel .section-head h2{font-size:1.1rem;font-weight:600}
#priceChart{width:100%;height:460px;display:block;border-radius:6px}
.idea-panel{background:#141c26;border-radius:12px;padding:18px;border:1px solid #1f2a36;display:flex;flex-direction:column;gap:16px}
.section-head.compact h2{font-size:1rem;font-weight:600}
.levels{display:flex;flex-direction:column;gap:4px}
.level{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0b1117;border-radius:8px;font-size:.82rem}
.level span{color:#8c98a5}
.level strong{color:#f0f4f8;font-weight:600;font-variant-numeric:tabular-nums}
.checks{display:flex;flex-direction:column;gap:6px}
.check{display:flex;align-items:flex-start;gap:8px;font-size:.77rem;color:#8c98a5;line-height:1.4;padding:6px 8px;border-radius:6px;background:#0e151e}
.check span{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;margin-top:1px}
.check.ok span{background:#1a3a2a;color:#3fb950}
.check.bad span{background:#3a1a1a;color:#f85149}
/* signal history */
.history-section,.dashboard-section{margin-top:8px}
.stats-bar{display:flex;flex-wrap:wrap;gap:16px;padding:10px 16px;background:#0e151e;border:1px solid #1f2a36;border-radius:10px;margin-bottom:8px;font-size:.75rem}
.stat-item{display:flex;gap:6px;align-items:baseline}
.stat-item span{color:#5c6a7a}
.stat-item strong{color:#f0f4f8;font-weight:600;font-variant-numeric:tabular-nums}
.stat-item .stat-win{color:#3fb950}
.stat-item .stat-loss{color:#f85149}
.stat-item .stat-pending{color:#73808d}
.history-toggle,.backtest-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:#141c26;border:1px solid #1f2a36;border-radius:12px;padding:14px 20px;cursor:pointer;font-family:inherit;color:#e6edf3;transition:background .15s}
.history-toggle:hover{background:#1a2533}
.history-toggle-left{display:flex;align-items:center;gap:12px}
.history-toggle-left h3{font-size:.95rem;font-weight:600}
.history-count{background:#1f2a36;color:#8c98a5;font-size:.7rem;padding:2px 10px;border-radius:20px;font-weight:500}
.history-toggle .arrow{color:#73808d;font-size:.75rem;transition:transform .2s}
.history-toggle.open .arrow{transform:rotate(180deg)}
.history-body{border:1px solid #1f2a36;border-top:none;border-radius:0 0 12px 12px;overflow:hidden;display:none}
.history-body.open{display:block}
.history-header{display:grid;grid-template-columns:100px 80px 70px 60px 70px 50px 55px 1fr;gap:4px;padding:10px 16px;background:#0e151e;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#5c6a7a;border-bottom:1px solid #1f2a36}
.history-scroll{max-height:500px;overflow-y:auto}
.history-scroll::-webkit-scrollbar{width:5px}
.history-scroll::-webkit-scrollbar-track{background:transparent}
.history-scroll::-webkit-scrollbar-thumb{background:#1f2a36;border-radius:3px}
.history-entry{border-bottom:1px solid #0e151e;cursor:pointer;transition:background .1s}
.history-entry:hover{background:#0e151e}
.history-entry:last-child{border-bottom:none}
.history-summary{display:grid;grid-template-columns:100px 80px 70px 60px 70px 50px 55px 1fr;gap:4px;padding:10px 16px;align-items:center;font-size:.8rem}
.history-summary .h-time{color:#5c6a7a;font-size:.75rem;font-variant-numeric:tabular-nums}
.history-summary .h-pair{color:#8c98a5;font-weight:500;font-size:.75rem}
.history-summary .h-dir{font-weight:700;font-size:.78rem}
.history-summary .h-dir.buy{color:#3fb950}
.history-summary .h-dir.sell{color:#f85149}
.history-summary .h-dir.wait{color:#b58cff}
.history-summary .h-conf{color:#f0f4f8;font-weight:600;font-variant-numeric:tabular-nums}
.history-summary .h-risk{font-size:.72rem;padding:2px 8px;border-radius:10px;background:#1f2a36;color:#8c98a5;text-align:center}
.history-summary .h-risk.valid{background:#1a3a2a;color:#3fb950}
.history-summary .h-vol{color:#8c98a5;font-variant-numeric:tabular-nums;font-size:.75rem}
.history-summary .h-expand{color:#5c6a7a;font-size:.65rem;text-align:right}
.history-summary .h-result{font-size:.68rem;font-weight:600;text-align:center}
.history-summary .h-result.win{color:#3fb950}
.history-summary .h-result.loss{color:#f85149}
.history-summary .h-result.pending{color:#73808d}
.history-summary .h-delete{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.8rem;padding:2px 6px;border-radius:4px;font-family:inherit;line-height:1;transition:color .15s,background .15s}
.history-summary .h-delete:hover{color:#f85149;background:#3a1a1a}
.history-detail{padding:14px 16px 16px;background:#0b1117;display:none;border-top:1px solid #1f2a36}
.history-detail.open{display:block}
.history-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:12px}
.history-detail-grid .hd-item{display:flex;justify-content:space-between;font-size:.8rem;padding:4px 0;border-bottom:1px solid #0e151e}
.history-detail-grid .hd-item span:first-child{color:#5c6a7a}
.history-detail-grid .hd-item span:last-child{color:#e6edf3;font-weight:500;font-variant-numeric:tabular-nums}
.history-detail-reasons{margin-top:6px}
.history-detail-reasons p{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#5c6a7a;margin-bottom:6px}
.history-detail-reasons .hd-reason{font-size:.75rem;color:#8c98a5;padding:3px 0;display:flex;align-items:center;gap:8px}
.hd-reason .hd-r-icon{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0}
.hd-reason .hd-r-icon.ok{background:#1a3a2a;color:#3fb950}
.hd-reason .hd-r-icon.bad{background:#3a1a1a;color:#f85149}
.history-empty{padding:30px 20px;text-align:center;color:#5c6a7a;font-size:.85rem}
.history-actions{display:flex;gap:8px;padding:10px 16px;background:#0e151e;border-top:1px solid #1f2a36;justify-content:flex-end}
.history-actions button{background:#1f2a36;border:none;color:#8c98a5;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:inherit;transition:background .15s}
.history-actions button:hover{background:#2a3848;color:#e6edf3}
/* scan button */
.scan-button{display:inline-flex;align-items:center;gap:6px;background:#1a2533;border:1px solid #1f2a36;color:#8c98a5;padding:6px 14px 6px 10px;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .2s;white-space:nowrap}
.scan-button:hover{background:#1f2a36;color:#e6edf3}
.scan-button .dot{width:7px;height:7px;border-radius:50%;background:#5c6a7a;transition:background .3s}
.scan-button .dot.active{background:#3fb950;box-shadow:0 0 6px rgba(63,185,80,.4)}
.scan-button .dot.active.pulse{animation:pulse 1.5s ease-in-out infinite}
.scan-button.active{background:#0f2a1a;border-color:#2ea043;color:#3fb950}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.no-select{-webkit-user-select:none;user-select:none}
/* overview grid */
.overview-section{margin-bottom:16px}
.overview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.overview-head h3{font-size:1rem;font-weight:600}
.ov-star{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.85rem;padding:0;line-height:1;font-family:inherit;transition:color .15s}
.ov-star.active{color:#f0c35a}
.ov-star:hover{color:#f0c35a}
.ov-alert-btn{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.72rem;padding:1px 4px;border-radius:3px;font-family:inherit;line-height:1}
.ov-alert-btn:hover{background:#1f2a36;color:#e6edf3}
.ov-card{align-items:stretch}
.ov-card-top{display:flex;justify-content:space-between;align-items:center}
/* alerts section */
.alerts-section{margin-bottom:12px}
.alerts-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.alerts-head h4{font-size:.85rem;font-weight:600}
.alerts-grid{display:flex;flex-wrap:wrap;gap:6px}
.alert-chip{display:flex;align-items:center;gap:6px;background:#141c26;border:1px solid #1f2a36;border-radius:6px;padding:4px 10px;font-size:.72rem;color:#8c98a5}
.alert-chip strong{color:#f0f4f8}
.alert-chip-rm{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.7rem;padding:0 2px;line-height:1;font-family:inherit}
.alert-chip-rm:hover{color:#f85149}
/* perf chart */
.perf-section{margin-bottom:12px;background:#0e151e;border:1px solid #1f2a36;border-radius:10px;padding:10px 14px}
.perf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.perf-head h4{font-size:.8rem;font-weight:600;color:#e6edf3}
.perf-head span{font-size:.68rem;color:#5c6a7a}
.overview-head .ov-progress{font-size:.72rem;color:#73808d}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px}
.ov-card{background:#141c26;border:1px solid #1f2a36;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:1px;border-left:3px solid #73808d;transition:opacity .3s}
.ov-card.buy{border-left-color:#2ea043}
.ov-card.sell{border-left-color:#da3633}
.ov-card.wait{border-left-color:#b58cff}
.ov-card.loading{opacity:.5}
.ov-pair{font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:#73808d}
.ov-signal{font-size:.85rem;font-weight:700}
.ov-card.buy .ov-signal{color:#3fb950}
.ov-card.sell .ov-signal{color:#f85149}
.ov-card.wait .ov-signal{color:#b58cff}
.ov-meta{font-size:.68rem;color:#8c98a5;display:flex;justify-content:space-between;gap:2px}
.chg-up{color:#3fb950}
.chg-down{color:#f85149}
@media(max-width:640px){.overview-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
@media(max-width:640px){
  #root{padding:12px 12px 32px}
  .topbar h1{font-size:1.15rem}
  .pair-controls{gap:6px;padding:6px 8px;flex-wrap:wrap}
  .select-wrap select{font-size:.78rem;min-width:36px;padding:2px 14px 2px 2px}
  .signal-row span{font-size:1.2rem}
  .signal-panel{padding:12px 14px}
  .metric{padding:12px 14px}
  .metric strong{font-size:1.05rem}
}
@media(max-width:700px){
  .history-header{display:none}
  .history-summary{grid-template-columns:1fr auto;gap:2px 8px;padding:8px 12px}
  .history-summary .h-time{grid-column:1}
  .history-summary .h-pair{grid-column:1}
  .history-summary .h-dir{grid-row:1;grid-column:2;text-align:right}
  .history-summary .h-result{grid-row:1;grid-column:2;text-align:right;position:relative;top:-14px;font-size:.6rem}
  .history-summary .h-conf{grid-row:2;grid-column:2;text-align:right}
  .history-summary .h-risk{grid-row:3;grid-column:2;text-align:right}
  .history-summary .h-vol{display:none}
  .history-summary .h-expand{grid-column:1;text-align:left;color:#5c6a7a}
  .history-summary .h-delete{position:relative;top:-8px;font-size:.7rem}
  .history-detail-grid{grid-template-columns:1fr}
  .chart-panel{padding:10px}
  #priceChart{height:280px}
}
@media(max-width:480px){
  .pair-controls .icon-button{width:28px;height:28px;font-size:.85rem}
  .scan-button{font-size:.7rem;padding:4px 8px 4px 6px}
}
.positions-section{border:1px solid #1f2a36;border-radius:10px;padding:12px;margin-bottom:10px}
.positions-section.closed{opacity:.7}
.positions-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.positions-head h4{font-size:.82rem;font-weight:600}
.positions-head span{background:#1f2a36;padding:1px 8px;border-radius:8px;font-size:.72rem;color:#8c98a5}
.pos-row{border:1px solid #1f2a36;border-radius:8px;padding:8px 10px;margin-bottom:6px;background:#0e151e}
.pos-buy{border-left:3px solid #3fb950}
.pos-sell{border-left:3px solid #f85149}
.pos-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.pos-pair{font-size:.72rem;font-weight:700;text-transform:uppercase}
.pos-dir{font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:700}
.pos-buy .pos-dir{color:#3fb950;background:rgba(63,185,80,.12)}
.pos-sell .pos-dir{color:#f85149;background:rgba(248,81,73,.12)}
.pos-profit{color:#3fb950}
.pos-loss{color:#f85149}
.pos-btn{background:#1f2a36;border:none;color:#8c98a5;cursor:pointer;font-size:.65rem;padding:2px 8px;border-radius:4px}
.pos-btn:hover{background:#2a384a;color:#e6edf3}
.pos-meta{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:6px;font-size:.65rem;color:#8c98a5}
.pos-meta span{white-space:nowrap}
.h-trade-btn{background:transparent;border:1px solid #2a384a;color:#73808d;cursor:pointer;font-size:.6rem;padding:0 5px;border-radius:3px;margin-left:2px;vertical-align:middle}
.h-trade-btn[disabled]{opacity:.3;cursor:default}
.h-trade-btn:hover:not([disabled]){border-color:#8c98a5;color:#e6edf3}
.hd-trade-btn{display:block;margin:8px auto 0;background:#1f2a36;border:none;color:#8dd7ff;cursor:pointer;font-size:.72rem;padding:6px 14px;border-radius:6px}
.hd-trade-btn:hover{background:#2a384a;color:#e6edf3}
.tf-row{display:flex;gap:4px;padding:6px 12px;justify-content:center}
.tf-btn{background:transparent;border:1px solid #1f2a36;color:#5c6a7a;font-size:.65rem;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:inherit;letter-spacing:.02em}
.tf-btn.active{background:#1a2533;border-color:#394757;color:#e6edf3}
.tf-btn.disabled{opacity:.35;cursor:not-allowed}
.tf-btn:not(.disabled):hover{border-color:#394757}
.toggle{position:relative;display:inline-block;width:36px;height:20px;cursor:pointer}
.toggle input{display:none}
.toggle-track{position:absolute;inset:0;background:#1f2a36;border-radius:10px;transition:.3s}
.toggle input:checked~.toggle-track{background:#3fb950}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#e6edf3;border-radius:50%;transition:.3s}
.toggle input:checked~.toggle-knob{left:18px}
.cond-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#0e151e;border-radius:6px}
.cond-info{display:flex;flex-direction:column;gap:2px}
.cond-title{font-size:.78rem;font-weight:600;color:#e6edf3}
.cond-desc{font-size:.65rem;color:#5c6a7a}
.cond-controls{display:flex;align-items:center;gap:8px}
@media(max-width:768px){
  .workspace{grid-template-columns:1fr !important}
  .summary-grid{grid-template-columns:1fr !important}
  .topbar{padding:10px 0}
  .topbar h1{font-size:1.15rem}
  .eyebrow{font-size:.6rem}
  .overview-grid{grid-template-columns:1fr 1fr !important}
  .pair-controls{flex-wrap:wrap;gap:6px;padding:6px 8px}
  .stats-bar{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .tf-btn{min-height:36px;font-size:.72rem;padding:6px 14px}
  .pos-meta{flex-direction:column}
  .settings-panel{width:100% !important}
  .signal-panel{width:100%}
  #root{padding:12px 12px 32px}
  .topbar h1{font-size:1.1rem}
  .select-wrap select{font-size:.78rem;min-width:36px;padding:2px 14px 2px 2px}
  .signal-row span{font-size:1.2rem}
  .signal-panel{padding:12px 14px}
  .metric{padding:12px 14px}
  .metric strong{font-size:1.05rem}
}
.corr-cell{width:48px;height:36px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:600;border-radius:3px;color:#e6edf3}
.replay-bar{display:flex;gap:6px;align-items:center;padding:8px 12px;background:#0e151e;border:1px solid #1f2a36;border-radius:8px}
.replay-bar button{background:#1f2a36;border:1px solid #2a3848;color:#8c98a5;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:.7rem;font-family:inherit}
.replay-bar button:hover{background:#2a384a;color:#e6edf3}
.replay-bar button.active{background:#1a3a2a;border-color:#2ea043;color:#3fb950}
.paper-trade{border-left:3px solid #8dd7ff}
.paper-trade .pos-dir{color:#8dd7ff;background:rgba(141,215,255,.12)}
.opt-row{display:flex;align-items:center;gap:8px;font-size:.68rem;padding:4px 0;border-bottom:1px solid #0e151e}
.opt-row span{flex:1;color:#8c98a5}
.opt-best{background:#1a3a2a;border-radius:4px;padding:4px 8px}
</style>
</head>
<body>

function closeTrade(id, exitPrice) {

  pos.closedAt = new Date();

  const diff = exitPrice - pos.entry;

  pos.pnlPct = pos.entry ? (pos.pnl / pos.entry) * 100 : 0;

  savePositions();
  render();
}

function updateTrailingStop(pos, price) {
  if (pos.originalStop == null) {
    pos.originalStop = pos.stop;
    pos.trailingStop = false;
    pos.highWater = pos.entry;
    pos.lowWater = pos.entry;
  }
  const isBuy = pos.direction === "BUY";
  const risk = Math.abs(pos.entry - pos.originalStop);
  if (risk <= 0) return;
  if (isBuy) {
    pos.highWater = Math.max(pos.highWater || pos.entry, price);
    const favorDist = price - pos.entry;
    if (favorDist >= risk * 3) {
      const atrVal = pos.atr || risk;
      const newStop = pos.highWater - 2 * atrVal;
      if (newStop > pos.stop) { pos.stop = newStop; pos.trailingStop = true; }
    } else if (favorDist >= risk * 1.5) {
      const newStop = pos.entry + risk * 0.1;
      if (newStop > pos.stop) { pos.stop = newStop; pos.trailingStop = true; }
    }
  } else {
    pos.lowWater = Math.min(pos.lowWater || pos.entry, price);
    const favorDist = pos.entry - price;
    if (favorDist >= risk * 3) {
      const atrVal = pos.atr || risk;
      const newStop = pos.lowWater + 2 * atrVal;
      if (newStop < pos.stop) { pos.stop = newStop; pos.trailingStop = true; }
    } else if (favorDist >= risk * 1.5) {
      const newStop = pos.entry - risk * 0.1;
      if (newStop < pos.stop) { pos.stop = newStop; pos.trailingStop = true; }
    }
  }
}

function evaluateAlertConditions(testMode = false) {
  const now = Date.now();
  const cooldown = 30 * 60 * 1000;
  const analysis = analyze(state.rows, loadStrategyConfig());
  if (!analysis) return [];
  const mtf = state.mtf;
  const rows = state.rows;
  const fired = [];
  Object.values(alertConditions).forEach(cond => {
    if (!cond.enabled) return;
    if (!testMode && now - (cond.lastFired || 0) < cooldown) return;
    let fire = false;
    if (cond.type === "mtf_alignment") {
      const dirs = ["1d", "4h", "1h"].map(tf => mtf[tf]?.direction).filter(d => d);
      dirs.push(analysis.direction);
      if (dirs.length >= 3) { const allBuy = dirs.every(d => d === "BUY"); const allSell = dirs.every(d => d === "SELL"); fire = allBuy || allSell; }
    }
    if (cond.type === "pattern_trend") {
      const hasBullishPattern = analysis.reasons.some(r => r.ok && (r.text.includes("engulfing") || r.text.includes("hammer")));
      const hasBearishPattern = analysis.reasons.some(r => r.ok && (r.text.includes("engulfing") || r.text.includes("shooting star")));
      const trendConfirmsBuy = analysis.direction === "BUY" && analysis.buyScore > analysis.sellScore;
      const trendConfirmsSell = analysis.direction === "SELL" && analysis.sellScore > analysis.buyScore;
      fire = (hasBullishPattern && trendConfirmsBuy) || (hasBearishPattern && trendConfirmsSell);
    }
    if (cond.type === "high_confidence") {
      fire = analysis.confidence >= (cond.threshold || 85);
    }
    if (cond.type === "volume_surge") {
      const hasVolume = rows.some(r => Number.isFinite(r.volume) && r.volume > 0);
      if (hasVolume) {
        const volSma = sma(rows.map(r => r.volume), 20);
        const lastVol = rows.at(-1).volume;
        const lastSma = volSma.at(-1);
        fire = lastVol > lastSma * (cond.threshold || 1.5);
      }
    }
    if (fire) {
      cond.lastFired = now;
      fired.push(cond.type);
      notifySignal({ direction: analysis.direction, pair: `${state.base}/${state.quote}`, confidence: analysis.confidence, risk: analysis.risk, entry: analysis.entry });
      pushAlertHistory(`${state.base}/${state.quote}`, cond.type, `${cond.type.replace(/_/g, " ")} triggered on ${state.base}/${state.quote} — ${analysis.direction} (${analysis.confidence}%)`);
    }
  });
  if (fired.length > 0) saveAlertConditions();
  return fired;
}

      changed = true;
      const dirLabel = alert.dir === "above" ? "above" : "below";

        });
      }
    }
  }
  if (changed) render();
}

function sma(values, period) {
  const out = Array(values.length).fill(null);
  let sum = 0;
  for (let i = 0; i < values.length; i++) {
    sum += values[i];
    if (i >= period) sum -= values[i - period];
    if (i >= period - 1) out[i] = sum / period;
  }
  return out;
}

function ema(values, period) {
  const out = Array(values.length).fill(null);
  const k = 2 / (period + 1);
  let sum = 0;
  for (let i = 0; i < values.length; i++) {
    if (i < period) sum += values[i];
    if (i === period - 1) out[i] = sum / period;
    if (i >= period) out[i] = values[i] * k + out[i - 1] * (1 - k);
  }
  return out;
}

function rsi(values, period = 14) {
  const out = Array(values.length).fill(null);
  if (values.length <= period) return out;
  let gain = 0;
  let loss = 0;
  for (let i = 1; i <= period; i++) {
    const move = values[i] - values[i - 1];
    if (move >= 0) gain += move;
    else loss -= move;
  }
  let avgGain = gain / period;
  let avgLoss = loss / period;
  out[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (let i = period + 1; i < values.length; i++) {
    const move = values[i] - values[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(move, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-move, 0)) / period;
    out[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return out;
}

function macd(values) {
  const fast = ema(values, 12);
  const slow = ema(values, 26);
  const line = values.map((_, i) => (fast[i] != null && slow[i] != null ? fast[i] - slow[i] : null));
  const firstValid = line.findIndex(v => v != null);
  if (firstValid === -1) return { line, signal: Array(values.length).fill(null), hist: Array(values.length).fill(null) };
  const validLine = line.slice(firstValid);
  const signalValid = ema(validLine, 9);
  const signal = line.map((v, i) => (i >= firstValid && i - firstValid < signalValid.length ? signalValid[i - firstValid] : null));
  const hist = line.map((v, i) => (v != null && signal[i] != null ? v - signal[i] : null));
  return { line, signal, hist };
}

function bollinger(values, period = 20, mult = 2) {
  const mid = sma(values, period);
  const upper = Array(values.length).fill(null);
  const lower = Array(values.length).fill(null);
  for (let i = period - 1; i < values.length; i++) {
    let variance = 0;
    for (let j = i - period + 1; j <= i; j++) variance += (values[j] - mid[i]) ** 2;
    const sd = Math.sqrt(variance / period);
    upper[i] = mid[i] + sd * mult;
    lower[i] = mid[i] - sd * mult;
  }
  return { mid, upper, lower };
}

function atr(rows, period = 14) {
  const ranges = rows.map((row, i) => {
    if (i === 0) return Math.abs(row.high - row.low);
    return Math.max(
      Math.abs(row.high - row.low),
      Math.abs(row.high - rows[i - 1].close),
      Math.abs(row.low - rows[i - 1].close),
    );
  });
  return sma(ranges, period);
}

function stdev(values) {
  const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
  return Math.sqrt(values.reduce((sum, value) => sum + (value - mean) ** 2, 0) / values.length);
}

function makeOhlc(date, close, previousClose) {
  const open = previousClose ?? close;
  const baseRange = Math.abs(close - open) || Math.abs(close) * 0.0025;
  const spread = Math.max(baseRange * 0.7, Math.abs(close) * 0.0012);
  return {
    date,
    open,
    high: Math.max(close, open) + spread,
    low: Math.min(close, open) - spread,
    close,
  };
}

async function fetchFxRows(base, quote) {
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - 180);
  const fmt = (date) => date.toISOString().slice(0, 10);
  const mid = new Date(start.getTime() + (end.getTime() - start.getTime()) / 2);
  const url1 = `https://api.frankfurter.dev/v1/${fmt(start)}..${fmt(mid)}?from=${base}&to=${quote}`;
  const url2 = `https://api.frankfurter.dev/v1/${fmt(mid)}..${fmt(end)}?from=${base}&to=${quote}`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 20000);
  try {
    const [res1, res2] = await Promise.all([
      fetch(url1, { signal: controller.signal }),
      fetch(url2, { signal: controller.signal }),
    ]);
    if (!res1.ok || !res2.ok) throw new Error("FX data not available for this pair.");
    const [data1, data2] = await Promise.all([res1.json(), res2.json()]);
    const allRates = { ...data1.rates, ...data2.rates };
    const dates = Object.keys(allRates).sort();
    return dates.map((date, index) => {
      const close = allRates[date][quote];
      const previous = index > 0 ? allRates[dates[index - 1]][quote] : close;
      return makeOhlc(date, close, previous);
    });
  } finally {
    clearTimeout(timer);
  }
}

function binanceSymbol(base, quote) {
  const q = quote === "USD" ? "USDT" : quote;
  return base === "XAU" ? `PAXG${q}` : `${base}${q}`;
}

async function fetchBinanceRows(base, quote, interval = "1d", limitOverride) {
  const symbol = binanceSymbol(base, quote);
  const limit = limitOverride || (interval === "1d" ? 200 : interval === "4h" ? 500 : interval === "1h" ? 500 : 200);
  const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
  if (!response.ok) throw new Error(`Live data unavailable for ${base}/${quote}.`);
  const data = await response.json();
  return data
    .map((k) => ({
      date: new Date(k[0]).toISOString().slice(0, 10),
      open: Number(k[1]),
      high: Number(k[2]),
      low: Number(k[3]),
      close: Number(k[4]),
      volume: Number(k[5]),
    }))
    .filter((row) => Number.isFinite(row.close));
}

async function fetchLivePrice(base, quote) {
  try {
    if (nonFiat.has(base) || (binanceFiat.has(base) && quote === "USD")) {
      const symbol = binanceSymbol(base, quote);
      const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
      if (!r.ok) return null;
      const d = await r.json();
      return { price: Number(d.lastPrice), change: Number(d.priceChangePercent) };
    }
    try {
      const r = await fetch(`https://api.frankfurter.dev/v1/latest?from=${base}&to=${quote}`);
      if (r.ok) { const d = await r.json(); return { price: d.rates[quote], change: null }; }
    } catch {}
    const r2 = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${base.toLowerCase()}.min.json`);
    if (r2.ok) { const d2 = await r2.json(); const rate = d2[base.toLowerCase()]?.[quote.toLowerCase()]; if (rate) return { price: rate, change: null }; }
    return null;
  } catch {
    return null;
  }
}

function seededRandom(seedText) {
  let seed = 2166136261;
  for (let i = 0; i < seedText.length; i++) {
    seed ^= seedText.charCodeAt(i);
    seed = Math.imul(seed, 16777619);
  }
  return () => {
    seed += 0x6d2b79f5;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function generateFallbackRows(base, quote) {
  const random = seededRandom(`${base}/${quote}`);
  const rows = [];
  const date = new Date();
  date.setDate(date.getDate() - 620);
  let close = fallbackStartPrice(base, quote);
  const dailyVol = base === "XAU" ? 0.008 : nonFiat.has(base) ? 0.025 : quote === "JPY" ? 0.0045 : 0.0038;
  const drift = base === "XAU" ? 0.00008 : nonFiat.has(base) ? 0.0005 : random() > 0.5 ? 0.00012 : -0.0001;

  while (rows.length < 430) {
    date.setDate(date.getDate() + 1);
    const day = date.getDay();
    if (day === 0 || day === 6) continue;
    const wave = Math.sin(rows.length / 18) * dailyVol * 0.42;
    const shock = (random() - 0.5) * dailyVol;
    const previous = close;
    close = Math.max(0.0001, close * (1 + drift + wave + shock));
    rows.push(makeOhlc(date.toISOString().slice(0, 10), close, previous));
  }
  return rows;
}

function detectRegime(rows) {
  if (rows.length < 30) return { type: "ranging", adx: 0 };
  const period = 14;
  const len = rows.length;
  const tr = [];
  const plusDM = [];
  const minusDM = [];
  for (let i = 1; i < len; i++) {
    tr.push(Math.max(
      rows[i].high - rows[i].low,
      Math.abs(rows[i].high - rows[i - 1].close),
      Math.abs(rows[i].low - rows[i - 1].close)
    ));
    const upMove = rows[i].high - rows[i - 1].high;
    const downMove = rows[i - 1].low - rows[i].low;
    plusDM.push(upMove > downMove && upMove > 0 ? upMove : 0);
    minusDM.push(downMove > upMove && downMove > 0 ? downMove : 0);
  }
  if (tr.length < period * 2) return { type: "ranging", adx: 0 };
  const smoothedTR = ema(tr, period);
  const smoothedPlusDM = ema(plusDM, period);
  const smoothedMinusDM = ema(minusDM, period);
  const dxValues = [];
  for (let i = 0; i < tr.length; i++) {
    if (smoothedTR[i] == null || smoothedTR[i] === 0 || smoothedPlusDM[i] == null || smoothedMinusDM[i] == null) continue;
    const plusDI = (smoothedPlusDM[i] / smoothedTR[i]) * 100;
    const minusDI = (smoothedMinusDM[i] / smoothedTR[i]) * 100;
    const sum = plusDI + minusDI;
    dxValues.push(sum === 0 ? 0 : Math.abs(plusDI - minusDI) / sum * 100);
  }
  if (dxValues.length < period) return { type: "ranging", adx: 0 };
  const adxArr = ema(dxValues, period);
  const adx = adxArr[adxArr.length - 1] || 0;
  return { type: adx > 25 ? "trending" : "ranging", adx: Math.round(adx * 10) / 10 };
}

function computeIchimoku(rows) {
  const len = rows.length;
  const tenkan = Array(len).fill(null);
  const kijun = Array(len).fill(null);
  const senkouA = Array(len).fill(null);
  const senkouB = Array(len).fill(null);
  const chikou = Array(len).fill(null);
  for (let i = 0; i < len; i++) {
    if (i >= 8) {
      let hi = -Infinity, lo = Infinity;
      for (let j = i - 8; j <= i; j++) { hi = Math.max(hi, rows[j].high); lo = Math.min(lo, rows[j].low); }
      tenkan[i] = (hi + lo) / 2;
    }
    if (i >= 25) {
      let hi = -Infinity, lo = Infinity;
      for (let j = i - 25; j <= i; j++) { hi = Math.max(hi, rows[j].high); lo = Math.min(lo, rows[j].low); }
      kijun[i] = (hi + lo) / 2;
    }
    if (i >= 25) {
      let hi = -Infinity, lo = Infinity;
      for (let j = i - 52; j <= i; j++) { if (j >= 0) { hi = Math.max(hi, rows[j].high); lo = Math.min(lo, rows[j].low); } }
      senkouB[i] = (hi + lo) / 2;
    }
    if (tenkan[i] != null && kijun[i] != null) senkouA[i] = (tenkan[i] + kijun[i]) / 2;
    chikou[i] = rows[i].close;
  }
  return { tenkan, kijun, senkouA, senkouB, chikou };
}

function findFibLevels(rows, lookback) {
  const slice = rows.slice(-lookback);
  let hi = -Infinity, lo = Infinity, hiIdx = 0, loIdx = 0;
  slice.forEach((r, i) => { if (r.high > hi) { hi = r.high; hiIdx = i; } if (r.low < lo) { lo = r.low; loIdx = i; } });
  const range = hi - lo;
  if (range <= 0) return [];
  const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1.0];
  const isFibUp = loIdx < hiIdx;
  return levels.map(pct => ({ pct, price: isFibUp ? lo + range * pct : hi - range * pct, label: (pct * 100).toFixed(1) + "%" }));
}

function ichimokuCloudColor(senkouA, senkouB) {
  if (senkouA == null || senkouB == null) return "rgba(100,140,180,0.08)";
  return senkouA > senkouB ? "rgba(63,185,80,0.12)" : "rgba(248,81,73,0.12)";
}

function pearsonCorrelation(x, y) {
  const n = Math.min(x.length, y.length);
  if (n < 10) return 0;
  const xs = x.slice(-n), ys = y.slice(-n);
  const mx = xs.reduce((s,v) => s+v, 0) / n;
  const my = ys.reduce((s,v) => s+v, 0) / n;
  let num = 0, dx = 0, dy = 0;
  for (let i = 0; i < n; i++) { const a = xs[i] - mx, b = ys[i] - my; num += a*b; dx += a*a; dy += b*b; }
  return dx > 0 && dy > 0 ? num / Math.sqrt(dx * dy) : 0;
}

function corrColor(v) {
  if (v >= 0.7) return "#2ea043";

  if (v >= -0.3) return "#73808d";

  return "#da3633";
}

async function computeCorrelationMatrix() {

      }

  }));

function kellyFraction(winRate, avgWin, avgLoss) {
  if (avgWin <= 0 || avgLoss <= 0) return 0;
  const b = avgWin / avgLoss;
  const kelly = (winRate * b - (1 - winRate)) / b;
  return Math.max(0, Math.min(kelly * 0.5, 0.25));
}

function runMonteCarlo(trades, iterations) {
  if (trades.length < 5) return null;
  const wins = trades.filter(t => t.result === "win");
  const losses = trades.filter(t => t.result === "loss");
  if (wins.length === 0 && losses.length === 0) return null;
  const pnls = trades.map(t => t.pnlPct);
  const n = pnls.length;
  const results = [];
  for (let iter = 0; iter < iterations; iter++) {
    const shuffled = [...pnls];
    for (let i = n - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
    let eq = 0, peak = 0, maxDD = 0;
    const curve = [0];
    for (const pnl of shuffled) { eq += pnl; curve.push(eq); if (eq > peak) peak = eq; const dd = peak - eq; if (dd > maxDD) maxDD = dd; }
    results.push({ curve, finalEq: eq, maxDD });
  }
  results.sort((a, b) => a.finalEq - b.finalEq);
  const pct = (p) => results[Math.floor(p * results.length)]?.finalEq || 0;
  const ddPct = (p) => results[Math.floor(p * results.length)]?.maxDD || 0;
  const medianCurve = results[Math.floor(0.5 * results.length)]?.curve || [0];
  return {
    p5: pct(0.05), p25: pct(0.25), p50: pct(0.5), p75: pct(0.75), p95: pct(0.95),
    medianDD: ddPct(0.5), worstDD: ddPct(0.95),
    medianCurve,
  };
}

async function runWalkForward() {

    ];
    const windowSize = 200;

    for (let seg = 0; seg < segments; seg++) {

      const trainStart = seg * testSize;

      const testEnd = Math.min(trainEnd + testSize, rows.length);
      if (testEnd > rows.length) break;
      const trainData = rows.slice(trainStart, trainEnd);
      const testData = rows.slice(trainEnd, testEnd);
      let bestCfg = loadStrategyConfig();

      for (const overrides of paramGrid) {
        const cfg = { ...loadStrategyConfig(), ...overrides };
        const trades = [];
        for (let i = 80; i < trainData.length; i++) {
          const a = analyze(trainData.slice(0, i + 1), cfg);
          if (!a || a.direction === "WAIT") continue;
          const entry = a.entry;
          const isBuy = a.direction === "BUY";
          const riskPct = isBuy ? ((entry - a.stop) / entry) * 100 : ((a.stop - entry) / entry) * 100;
          const rewardPct = isBuy ? ((a.target - entry) / entry) * 100 : ((entry - a.target) / entry) * 100;
          let result = "pending", pnlPct = 0;
          for (let j = i + 1; j < trainData.length; j++) {
            if (isBuy) { if (trainData[j].high >= a.target) { result = "win"; pnlPct = rewardPct; break; } if (trainData[j].low <= a.stop) { result = "loss"; pnlPct = -riskPct; break; } }
            else { if (trainData[j].low <= a.target) { result = "win"; pnlPct = rewardPct; break; } if (trainData[j].high >= a.stop) { result = "loss"; pnlPct = -riskPct; break; } }
          }
          if (result !== "pending") trades.push({ result, pnlPct });
        }
        const w = trades.filter(t => t.result === "win").length;
        const l = trades.filter(t => t.result === "loss").length;
        const score = trades.length > 0 ? (w / trades.length) * 100 + (trades.reduce((s,t) => s + t.pnlPct, 0) * 0.5) : 0;
        if (score > bestScore) { bestScore = score; bestCfg = cfg; }
      }
      const testTrades = [];
      for (let i = 80; i < testData.length; i++) {
        const a = analyze(testData.slice(0, i + 1), bestCfg);
        if (!a || a.direction === "WAIT") continue;
        const entry = a.entry;
        const isBuy = a.direction === "BUY";
        const riskPct = isBuy ? ((entry - a.stop) / entry) * 100 : ((a.stop - entry) / entry) * 100;
        const rewardPct = isBuy ? ((a.target - entry) / entry) * 100 : ((entry - a.target) / entry) * 100;
        let result = "pending", pnlPct = 0;
        for (let j = i + 1; j < testData.length; j++) {
          if (isBuy) { if (testData[j].high >= a.target) { result = "win"; pnlPct = rewardPct; break; } if (testData[j].low <= a.stop) { result = "loss"; pnlPct = -riskPct; break; } }
          else { if (testData[j].low <= a.target) { result = "win"; pnlPct = rewardPct; break; } if (testData[j].high >= a.stop) { result = "loss"; pnlPct = -riskPct; break; } }
        }
        if (result !== "pending") testTrades.push({ result, pnlPct });
      }
      const tw = testTrades.filter(t => t.result === "win").length;
      const tl = testTrades.filter(t => t.result === "loss").length;
      wfResults.push({ segment: seg + 1, trainRange: `${trainData[0]?.date}→${trainData.at(-1)?.date}`, testRange: `${testData[0]?.date}→${testData.at(-1)?.date}`, trainWR: trainData.length > 0 ? Math.round((tw / Math.max(tw + tl, 1)) * 100) : 0, testWR: testTrades.length > 0 ? Math.round((tw / testTrades.length) * 100) : 0, testTrades: testTrades.length, testPnL: testTrades.reduce((s, t) => s + t.pnlPct, 0) });
    }
    const totalTestTrades = wfResults.reduce((s, r) => s + r.testTrades, 0);
    const avgTestWR = totalTestTrades > 0 ? Math.round(wfResults.reduce((s, r) => s + r.testWR, 0) / Math.max(wfResults.length, 1)) : 0;
    const totalTestPnL = wfResults.reduce((s, r) => s + r.testPnL, 0);
    wfState.results = { segments: wfResults, totalTestTrades, avgTestWR, totalTestPnL };
  } catch {}
  wfState.running = false;
  render();
}

          else { if (rows[k].low <= a.target) { result = "win"; pnlPct = rewardPct; break; } if (rows[k].high >= a.stop) { result = "loss"; pnlPct = -riskPctVal; break; } }

      let eq = 0, peak = -Infinity, maxDD = 0;

function advanceReplay() {
  const { rows, currentBar } = replayState;
  if (currentBar >= rows.length) { stopReplay(); return; }
  const slice = rows.slice(0, currentBar + 1);
  const cfg = loadStrategyConfig();
  const analysis = slice.length >= 80 ? analyze(slice, cfg) : null;
  replayState.direction = analysis?.direction || "WAIT";
  replayState.confidence = analysis?.confidence || 0;
  if (analysis && analysis.direction !== "WAIT") {
    const lastPrice = rows[currentBar].close;
    const isBuy = analysis.direction === "BUY";
    let result = null;
    for (let j = currentBar + 1; j < Math.min(currentBar + 30, rows.length); j++) {
      if (isBuy) { if (rows[j].high >= analysis.target) { result = "win"; break; } if (rows[j].low <= analysis.stop) { result = "loss"; break; } }
      else { if (rows[j].low <= analysis.target) { result = "win"; break; } if (rows[j].high >= analysis.stop) { result = "loss"; break; } }
    }
    replayState.trades.push({ bar: currentBar, date: rows[currentBar].date, direction: analysis.direction, confidence: analysis.confidence, entry: analysis.entry, stop: analysis.stop, target: analysis.target, result: result || "pending" });
  }
}

function stopReplay() {
  if (replayState.intervalId) { clearInterval(replayState.intervalId); replayState.intervalId = null; }
  replayState.active = false;
}

function stepReplay() {
  if (!replayState.active) return;
  replayState.currentBar++;
  advanceReplay();
  render();

function toggleReplayPlay() {
  if (replayState.intervalId) { clearInterval(replayState.intervalId); replayState.intervalId = null; render(); return; }

function addPaperTrade(direction, pair, entry, stop, target) {
  paperState.openPositions.push({ id: Date.now(), pair, direction, entry, stop, target, time: new Date(), exitPrice: null, pnlPct: 0 });
  savePaperState();

function closePaperTrade(id, exitPrice) {
  const pos = paperState.openPositions.find(p => p.id === id);
  if (!pos) return;
  pos.exitPrice = exitPrice;
  pos.pnlPct = pos.direction === "BUY" ? ((exitPrice - pos.entry) / pos.entry) * 100 : ((pos.entry - exitPrice) / pos.entry) * 100;
  pos.closedTime = new Date();
  paperState.balance += paperState.balance * (pos.pnlPct / 100);
  paperState.trades.push({ ...pos });
  paperState.openPositions = paperState.openPositions.filter(p => p.id !== id);
  paperState.equityCurve.push({ time: new Date(), balance: paperState.balance });
  savePaperState();
}

function autoCheckPaperPositions() {
  for (const pos of [...paperState.openPositions]) {
    const r = multiScan.results[pos.pair];
    if (!r || !r.price) continue;
    const price = r.price;
    const hitStop = pos.direction === "BUY" ? price <= pos.stop : price >= pos.stop;
    const hitTarget = pos.direction === "BUY" ? price >= pos.target : price <= pos.target;
    if (hitStop || hitTarget) closePaperTrade(pos.id, price);
  }
}

function analyze(rows, cfg) {
  if (rows.length < 80) return null;
  const threshold = cfg?.threshold ?? 5;
  const rrRatio = cfg?.riskRewardRatio ?? 2.0;
  const volumeMultiplier = cfg?.volumeMultiplier ?? 1.3;
  const volMedianMultiplier = cfg?.volatilityMedianMultiplier ?? 2.5;
  const rsiBuyThreshold = cfg?.rsiBuyThreshold ?? 55;
  const rsiSellThreshold = cfg?.rsiSellThreshold ?? 45;
  const regime = detectRegime(rows);
  const closes = rows.map((row) => row.close);
  const sma20 = sma(closes, 20);
  const sma50 = sma(closes, 50);
  const sma200 = sma(closes, 200);
  const rsi14 = rsi(closes, 14);
  const macdData = macd(closes);
  const bands = bollinger(closes);
  const atr14 = atr(rows, 14);
  const merged = rows.map((row, i) => ({
    ...row,
    sma20: sma20[i],
    sma50: sma50[i],
    sma200: sma200[i],
    rsi: rsi14[i],
    macd: macdData.line[i],
    macdSignal: macdData.signal[i],
    macdHist: macdData.hist[i],
    bUpper: bands.upper[i],
    bLower: bands.lower[i],
    atr: atr14[i],
  }));

  const last = merged.at(-1);
  const prev = merged.at(-2);
  const volatilityPct = (last.atr / last.close) * 100;
  const recentVols = merged.slice(-30).filter(r => r.atr != null).map(r => (r.atr / r.close) * 100);
  recentVols.sort((a,b) => a-b);
  const medianVol = recentVols.length > 0 ? recentVols[Math.floor(recentVols.length / 2)] : 1.5;
  const volatilityOk = volatilityPct < Math.max(medianVol * volMedianMultiplier, 0.3);
  const trendUp = last.sma20 > last.sma50 && last.close > last.sma50;
  const trendDown = last.sma20 < last.sma50 && last.close < last.sma50;
  const longTrendUp = last.sma200 != null && last.close > last.sma200;
  const longTrendDown = last.sma200 != null && last.close < last.sma200;
  const momentumUp = last.macd > last.macdSignal && last.macdHist > prev.macdHist;
  const momentumDown = last.macd < last.macdSignal && last.macdHist < prev.macdHist;
  const rsiBuyZone = last.rsi < rsiBuyThreshold;
  const rsiSellZone = last.rsi > rsiSellThreshold;
  const notExtendedLong = last.bUpper == null || last.close < last.bUpper;
  const notExtendedShort = last.bLower == null || last.close > last.bLower;
  const priceRising = rows.length >= 5 && last.close > rows[rows.length - 5].close;
  const priceFalling = rows.length >= 5 && last.close < rows[rows.length - 5].close;
  const hasVolume = rows.some(r => Number.isFinite(r.volume) && r.volume > 0);
  const volSma = hasVolume ? sma(rows.map(r => r.volume), 20) : null;
  const volSurge = hasVolume && volSma && last.volume > volSma.at(-1) * volumeMultiplier;
  const recentCloses = closes.slice(-10);
  const recentRsis = rsi14.slice(-10).filter(v => v != null);
  const priceLowNow = Math.min(...recentCloses.slice(-5));
  const priceLowPrev = Math.min(...recentCloses.slice(0, 5));
  const priceHighNow = Math.max(...recentCloses.slice(-5));
  const priceHighPrev = Math.max(...recentCloses.slice(0, 5));
  const rsiLowNow = Math.min(...recentRsis.slice(-5));
  const rsiLowPrev = Math.min(...recentRsis.slice(0, 5));
  const rsiHighNow = Math.max(...recentRsis.slice(-5));
  const rsiHighPrev = Math.max(...recentRsis.slice(0, 5));
  const bullishDiv = priceLowNow < priceLowPrev && rsiLowNow > rsiLowPrev;
  const bearishDiv = priceHighNow > priceHighPrev && rsiHighNow < rsiHighPrev;

  const currBody = Math.abs(last.close - last.open);
  const currRange = last.high - last.low;
  const currUpperWick = last.high - Math.max(last.open, last.close);
  const currLowerWick = Math.min(last.open, last.close) - last.low;
  const currGreen = last.close > last.open;
  const currRed = last.close < last.open;
  const prevGreen = prev.close > prev.open;
  const prevRed = prev.close < prev.open;
  const bullishEngulfing = prevRed && currGreen && last.close > prev.open && last.open < prev.close;
  const bearishEngulfing = prevGreen && currRed && last.close < prev.open && last.open > prev.close;
  const isDoji = currRange > 0 && Math.abs(last.open - last.close) / currRange < 0.1;
  const hammer = currLowerWick > 2 * currBody && currUpperWick < currBody && currBody > 0;
  const shootingStar = currUpperWick > 2 * currBody && currLowerWick < currBody && currBody > 0;

  const buyVotes = [trendUp, longTrendUp, momentumUp, rsiBuyZone, notExtendedLong, volatilityOk, priceRising, ...(macdHistVote ? [last.macdHist > 0 && last.macdHist > prev.macdHist] : [])];
  const sellVotes = [trendDown, longTrendDown, momentumDown, rsiSellZone, notExtendedShort, volatilityOk, priceFalling, ...(macdHistVote ? [last.macdHist < 0 && last.macdHist < prev.macdHist] : [])];
  const patternBuyBonus = (bullishEngulfing ? 1 : 0) + (hammer ? 1 : 0) + (isDoji ? 0.5 : 0);
  const patternSellBonus = (bearishEngulfing ? 1 : 0) + (shootingStar ? 1 : 0) + (isDoji ? 0.5 : 0);
  const buyScore = buyVotes.filter(Boolean).length + patternBuyBonus;
  const sellScore = sellVotes.filter(Boolean).length + patternSellBonus;
  const direction = buyScore >= threshold && buyScore > sellScore ? "BUY" : sellScore >= threshold && sellScore > buyScore ? "SELL" : "WAIT";
  const score = Math.max(buyScore, sellScore);
  const volBonus = volSurge ? 10 : 0;
  const divBonus = direction === "BUY" && bullishDiv ? 12 : direction === "SELL" && bearishDiv ? 12 : 0;
  const confidence = Math.min(100, Math.round((score / 7) * 100) + volBonus + divBonus);
  const risk = direction === "WAIT" || confidence < 72 || !volatilityOk ? "No trade" : "Low";
  const stopDistance = Math.max(last.atr * 1.15, last.close * 0.004);
  const targetDistance = stopDistance * rrRatio;
  const entry = last.close;
  const stop = direction === "BUY" ? entry - stopDistance : entry + stopDistance;
  const target = direction === "BUY" ? entry + targetDistance : entry - targetDistance;
  const reasons = [
    { ok: trendUp || trendDown, text: trendUp ? "Short-term trend supports buying" : trendDown ? "Short-term trend supports selling" : "Trend is mixed" },
    { ok: momentumUp || momentumDown, text: momentumUp ? "MACD momentum confirms upside" : momentumDown ? "MACD momentum confirms downside" : "MACD momentum is not confirmed" },
    { ok: rsiBuyZone || rsiSellZone, text: `RSI is ${last.rsi.toFixed(0)}${last.rsi < rsiBuyThreshold ? ", not overbought" : last.rsi > rsiSellThreshold ? ", not oversold" : ""}` },
    { ok: volatilityOk, text: volatilityOk ? "Volatility is acceptable for low-risk mode" : `Volatility ${volatilityPct.toFixed(2)}% exceeds pair's normal range` },
    { ok: regime.type === "trending", text: regime.type === "trending" ? `Market regime trending (ADX ${regime.adx})` : `Market regime ranging (ADX ${regime.adx})` },
    { ok: priceRising || priceFalling, text: priceRising ? "Price trending up over last 5 bars" : priceFalling ? "Price trending down over last 5 bars" : "Price direction unclear over last 5 bars" },
    { ok: volSurge, text: volSurge ? "Above-average volume confirms the move" : "Volume does not confirm unusual activity" },
    { ok: bullishDiv || bearishDiv, text: bullishDiv ? "Bullish RSI divergence detected — momentum building" : bearishDiv ? "Bearish RSI divergence detected — momentum fading" : "No RSI divergence pattern" },
    ...(bullishEngulfing ? [{ ok: true, text: "Bullish engulfing pattern detected" }] : []),
    ...(bearishEngulfing ? [{ ok: true, text: "Bearish engulfing pattern detected" }] : []),
    ...(isDoji ? [{ ok: false, text: "Doji pattern — indecision" }] : []),
    ...(hammer ? [{ ok: true, text: "Hammer pattern — potential reversal up" }] : []),
    ...(shootingStar ? [{ ok: true, text: "Shooting star — potential reversal down" }] : []),
  ];
  return { chartRows: merged.slice(-140), last, direction, confidence, risk, entry, stop, target, reasons, buyScore, sellScore, volatilityPct, regime };
}

function formatPrice(value, pair) {
  if (!Number.isFinite(value)) return "-";
  const digits = pair.includes("JPY") ? 3 : pair.includes("XAU") || nonFiat.has(pair.split("/")[0]) ? 2 : 5;
  return new Intl.NumberFormat("en-US", {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits,
    useGrouping: false,
  }).format(value);
}

function options(selected, exclude, disableNonFiat = false) {
  return currencies
    .filter((currency) => currency !== exclude)
    .map((currency) => `<option value="${currency}" ${currency === selected ? "selected" : ""} ${disableNonFiat && nonFiat.has(currency) ? "disabled" : ""}>${currency}</option>`)
    .join("");
}

function signalCopy(analysis, status) {
  if (status === "loading") return "Loading market data and checking strict confirmation filters.";
  if (status === "error") return "No signal is produced when live market data cannot be loaded.";
  if (!analysis) return "Waiting for enough market history.";
  if (analysis.direction === "WAIT") return "No low-risk entry right now. The app waits until the setup is cleaner.";
  return `${analysis.direction} idea with controlled risk, confirmed trend, momentum and volatility filters.`;
}

function metric(label, value) {
  return `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`;
}

function level(label, value) {
  return `<div class="level"><span>${label}</span><strong>${value}</strong></div>`;
}

function updateScanUI() {
  const dot = document.getElementById("scanDot");
  const label = document.getElementById("scanLabel");
  const btn = document.getElementById("autoScanToggle");
  if (!dot || !label || !btn) return;
  if (autoScan.enabled) {
    dot.className = "dot active pulse";
    label.textContent = "Scanning";
    btn.classList.add("active");
  } else {
    dot.className = "dot";
    label.textContent = "Auto-scan";
    btn.classList.remove("active");
  }
}

function addSignalToHistory(pair, task) {
  const direction = task?.direction ?? "WAIT";
  const lastForPair = autoScan.history.find(e => e.pair === pair);
  if (lastForPair && lastForPair.direction === direction && lastForPair.result === "pending") {
    Object.assign(lastForPair, {
      timestamp: new Date(),
      confidence: task?.confidence ?? 0,
      risk: task?.risk ?? "No trade",
      entry: task?.entry ?? null,
      stop: task?.stop ?? null,
      target: task?.target ?? null,
      volatilityPct: task?.volatilityPct ?? 0,
      buyScore: task?.buyScore ?? 0,
      sellScore: task?.sellScore ?? 0,
      reasons: task?.reasons ?? [],
    });
    saveHistory();
    return false;
  }
  autoScan.history.unshift({
    id: Date.now(),
    timestamp: new Date(),
    pair,
    direction,
    confidence: task?.confidence ?? 0,
    risk: task?.risk ?? "No trade",
    entry: task?.entry ?? null,
    stop: task?.stop ?? null,
    target: task?.target ?? null,
    volatilityPct: task?.volatilityPct ?? 0,
    buyScore: task?.buyScore ?? 0,
    sellScore: task?.sellScore ?? 0,
    reasons: task?.reasons ?? [],
    result: "pending",
  });
  if (autoScan.history.length > autoScan.maxEntries) autoScan.history.length = autoScan.maxEntries;
  saveHistory();
  return true;
}

function recordSignal() {
  const task = state.rows.length > 0 ? analyze(state.rows, loadStrategyConfig()) : null;
  const dir = task?.direction ?? "WAIT";
  const isNew = addSignalToHistory(`${state.base}/${state.quote}`, task);
  if (isNew && dir !== "WAIT") notifySignal({ direction: dir, pair: `${state.base}/${state.quote}`, confidence: task.confidence, risk: task.risk, entry: task.entry });
}

function saveHistory() {
  try { localStorage.setItem("signalHistory", JSON.stringify(autoScan.history)); } catch {}
}

function loadHistory() {
  try {
    const saved = localStorage.getItem("signalHistory");
    if (saved) {
      autoScan.history = JSON.parse(saved);
      autoScan.history.forEach(e => e.timestamp = new Date(e.timestamp));
      const cutoff = Date.now() - 14 * 24 * 60 * 60 * 1000;
      autoScan.history = autoScan.history.filter(e => e.result !== "pending" || (e.id || 0) > cutoff);
    }
  } catch {}
}

function playBeep() {
  if (!soundEnabled) return;
  try {

    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch {}
}

function renderPerformanceSummary() {
  const hist = autoScan.history.filter(e => e.direction !== "WAIT");
  const resolved = hist.filter(e => e.result === "win" || e.result === "loss");
  const closed = positions.filter(p => p.closedAt);
  const open = positions.filter(p => !p.closedAt);
  const totalResolved = resolved.length;
  const wins = resolved.filter(e => e.result === "win").length;
  const losses = resolved.filter(e => e.result === "loss").length;
  const overallWinRate = totalResolved > 0 ? Math.round((wins / totalResolved) * 100) : 0;
  const totalPnl = closed.reduce((s, p) => s + (p.pnlCurrency || 0), 0);
  let bestTrade = null, worstTrade = null;
  if (resolved.length > 0) {
    bestTrade = resolved.reduce((b, e) => {
      const rr = e.entry != null && e.stop != null && e.target != null && Math.abs(e.entry - e.stop) > 0 ? Math.abs(e.target - e.entry) / Math.abs(e.entry - e.stop) : 0;
      return !b || (e.result === "win" && rr > b.rr) ? { pair: e.pair, rr, result: e.result } : b;
    }, null);
    worstTrade = resolved.reduce((w, e) => {
      const rr = e.entry != null && e.stop != null && e.target != null && Math.abs(e.entry - e.stop) > 0 ? Math.abs(e.target - e.entry) / Math.abs(e.entry - e.stop) : 0;
      return !w || (e.result === "loss" && rr > w.rr) ? { pair: e.pair, rr, result: e.result } : w;
    }, null);
    if (bestTrade && bestTrade.result !== "win") bestTrade = resolved.filter(e => e.result === "win").map(e => ({ pair: e.pair, rr: e.entry != null && e.stop != null && e.target != null && Math.abs(e.entry - e.stop) > 0 ? Math.abs(e.target - e.entry) / Math.abs(e.entry - e.stop) : 0 })).sort((a, b) => b.rr - a.rr)[0] || null;
    if (worstTrade && worstTrade.result !== "loss") worstTrade = resolved.filter(e => e.result === "loss").map(e => ({ pair: e.pair, rr: e.entry != null && e.stop != null && e.target != null && Math.abs(e.entry - e.stop) > 0 ? Math.abs(e.target - e.entry) / Math.abs(e.entry - e.stop) : 0 })).sort((a, b) => b.rr - a.rr)[0] || null;
  }
  const totalSignals = hist.length;
  let avgDuration = null;
  if (closed.length > 0) {
    const durations = closed.map(p => (new Date(p.closedAt) - new Date(p.openedAt)) / 3600000).filter(d => d > 0);
    if (durations.length > 0) avgDuration = durations.reduce((s, d) => s + d, 0) / durations.length;
  }
  let winStreak = 0, lossStreak = 0, maxWinStreak = 0, maxLossStreak = 0;
  for (const e of resolved) {
    if (e.result === "win") { winStreak++; lossStreak = 0; if (winStreak > maxWinStreak) maxWinStreak = winStreak; }
    else { lossStreak++; winStreak = 0; if (lossStreak > maxLossStreak) maxLossStreak = lossStreak; }
  }
  let totalRRWon = 0, totalRRLost = 0;
  resolved.forEach(e => {
    const rr = e.entry != null && e.stop != null && e.target != null && Math.abs(e.entry - e.stop) > 0 ? Math.abs(e.target - e.entry) / Math.abs(e.entry - e.stop) : 0;
    if (e.result === "win") totalRRWon += rr; else totalRRLost += rr;
  });
  const fmtDur = avgDuration != null ? avgDuration < 24 ? avgDuration.toFixed(1) + "h" : (avgDuration / 24).toFixed(1) + "d" : "-";
  const fmtBest = bestTrade ? bestTrade.pair + " (+" + bestTrade.rr.toFixed(1) + "R)" : "-";
  const fmtWorst = worstTrade ? worstTrade.pair + " (-" + worstTrade.rr.toFixed(1) + "R)" : "-";
  return `<section class="dashboard-section"><button class="backtest-toggle no-select" id="perfSumToggle"><div class="history-toggle-left"><h3>Performance Summary</h3></div><span class="arrow">▾</span></button><div class="history-body" id="perfSumBody"><div style="padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;text-align:center"><div><div style="font-size:1rem;font-weight:700;color:${overallWinRate >= 50 ? '#3fb950' : '#f85149'}">${overallWinRate}%</div><div style="font-size:.6rem;color:#5c6a7a">Win Rate</div></div><div><div style="font-size:1rem;font-weight:700;color:${totalPnl >= 0 ? '#3fb950' : '#f85149'}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div><div style="font-size:.6rem;color:#5c6a7a">Total P/L</div></div><div><div style="font-size:1rem;font-weight:700;color:#3fb950">${fmtBest}</div><div style="font-size:.6rem;color:#5c6a7a">Best Trade</div></div><div><div style="font-size:1rem;font-weight:700;color:#f85149">${fmtWorst}</div><div style="font-size:.6rem;color:#5c6a7a">Worst Trade</div></div><div><div style="font-size:1rem;font-weight:700;color:#f0f4f8">${totalSignals}</div><div style="font-size:.6rem;color:#5c6a7a">Total Signals</div></div><div><div style="font-size:1rem;font-weight:700;color:#f0f4f8">${open.length}</div><div style="font-size:.6rem;color:#5c6a7a">Open Positions</div></div><div><div style="font-size:1rem;font-weight:700;color:#f0f4f8">${fmtDur}</div><div style="font-size:.6rem;color:#5c6a7a">Avg Duration</div></div><div><div style="font-size:1rem;font-weight:700;color:#3fb950">${maxWinStreak}</div><div style="font-size:.6rem;color:#5c6a7a">Win Streak</div></div><div><div style="font-size:1rem;font-weight:700;color:#f85149">${maxLossStreak}</div><div style="font-size:.6rem;color:#5c6a7a">Loss Streak</div></div><div><div style="font-size:1rem;font-weight:700;color:#3fb950">+${totalRRWon.toFixed(1)}R</div><div style="font-size:.6rem;color:#5c6a7a">R Won</div></div><div><div style="font-size:1rem;font-weight:700;color:#f85149">-${totalRRLost.toFixed(1)}R</div><div style="font-size:.6rem;color:#5c6a7a">R Lost</div></div><div><div style="font-size:1rem;font-weight:700;color:#f0f4f8">${wins}W / ${losses}L</div><div style="font-size:.6rem;color:#5c6a7a">Record</div></div></div></div></section>`;
}

function calcStats() {
  const signals = autoScan.history.filter(e => e.direction !== "WAIT" && e.result !== "pending");
  const total = signals.length;
  const wins = signals.filter(e => e.result === "win").length;
  const losses = signals.filter(e => e.result === "loss").length;
  const winRate = total > 0 ? Math.round((wins / total) * 100) : 0;
  let streak = 0;
  let streakType = "";
  for (let i = 0; i < signals.length; i++) {
    if (signals[i].result === "win") { if (streakType === "loss") break; streakType = "win"; streak++; }
    else if (signals[i].result === "loss") { if (streakType === "win") break; streakType = "loss"; streak++; }
    else break;
  }
  return { total, wins, losses, winRate, streak, streakType };
}

round:#1f2a36;border:1px solid #2a3848;color:#8c98a5;border-radius:6px;font-size:.68rem;cursor:pointer;font-family:inherit">Select All</button><button id="mpClearAll" style="padding:4px 10px;background:#1f2a36;border:1px solid #2a3848;color:#8c98a5;border-radius:6px;font-size:.68rem;cursor:pointer;font-family:inherit">Clear All</button></div></div><div style="padding:0 12px 12px"><button id="runMultiBacktest" style="width:100%;padding:10px;background:#b58cff;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.8rem;cursor:pointer">Run Multi-Pair Backtest</button></div>` : ""}</div></section>`;
  }
  if (backtest.running || backtest.comparing) {
    return `<section class="dashboard-section"><button class="backtest-toggle no-select" id="backtestToggle"><div class="history-toggle-left"><h3>Backtest Strategy</h3></div><span class="arrow">▾</span></button><div class="history-body open" id="backtestBody"><div style="padding:12px;text-align:center;color:#8c98a5;font-size:.72rem">${backtest.comparing ? "Running comparison..." : "Running backtest..."} ${backtest.progress}</div></div></section>`;
  }
  if (backtest.multiRunning) {
    return `<section class="dashboard-section"><button class="backtest-toggle no-select" id="backtestToggle"><div class="history-toggle-left"><h3>Backtest Strategy</h3></div><span class="arrow">▾</span></button><div class="history-body open" id="backtestBody"><div style="padding:12px;text-align:center;color:#8c98a5;font-size:.72rem">Running multi-pair backtest... ${backtest.multiProgress}</div></div></section>`;
  }
  const r = backtest.results;
  if ((!r || r.trades.length === 0) && !backtest.multiResults) return "";
  let singleResult = "";
  if (r && r.trades.length > 0) {
  const wins = r.trades.filter(t => t.result === "win").length;
  const losses = r.trades.filter(t => t.result === "loss").length;
  const pending = r.trades.filter(t => t.result === "pending").length;
  const total = r.trades.length;
  const wr = total > 0 ? Math.round((wins / total) * 100) : 0;
  const avgWin = wins > 0 ? r.trades.filter(t => t.result === "win").reduce((s, t) => s + t.pnlPct, 0) / wins : 0;
  const avgLoss = losses > 0 ? r.trades.filter(t => t.result === "loss").reduce((s, t) => s + t.pnlPct, 0) / losses : 0;
  const profitFactor = losses > 0 ? Math.abs(r.trades.filter(t => t.result === "win").reduce((s, t) => s + t.pnlPct, 0) / r.trades.filter(t => t.result === "loss").reduce((s, t) => s + t.pnlPct, 0)) : wins > 0 ? "∞" : 0;
  let eqCum = 0;
  const eqVals = r.trades.map(t => { eqCum += t.pnlPct; return eqCum; });
  const cum = eqVals.length > 0 ? eqVals[eqVals.length - 1] : 0;
  const eqPeaks = [];
  let runPeak = -Infinity;
  eqVals.forEach(v => { if (v > runPeak) runPeak = v; eqPeaks.push(runPeak); });
  const ddSeries = eqVals.map((v, i) => eqPeaks[i] - v);
  const maxDdPct = Math.max(...ddSeries, 0);
  let maxDdDur = 0, ddDur = 0;

v>${eqCurve}</div><div style="padding:0 12px 4px"><div style="font-size:.6rem;color:#5c6a7a;margin-bottom:2px">Drawdown</div>${ddChart}</div><div style="padding:8px 12px"><button id="runBacktest" style="width:100%;padding:8px;background:#1f2a36;color:#8c98a5;border:1px solid #2a3848;border-radius:8px;font-size:.75rem;cursor:pointer">Re-run Backtest</button></div></div></section>`;

  }

async function runBacktestImpl() {
  if (backtest.running) return;
  backtest.running = true;
  backtest.results = null;
  backtest.progress = "";
  render();
  try {
    const rows = await fetchBinanceRows(state.base, state.quote, "1d", 1000);
    if (rows.length < 120) { backtest.running = false; render(); return; }
    const cfg = loadStrategyConfig();
    const trades = [];
    for (let i = 100; i < rows.length; i++) {
      backtest.progress = `${i - 99}/${rows.length - 100}`;
      if (i % 50 === 0) { await new Promise(r => setTimeout(r, 0)); render(); }
      const slice = rows.slice(0, i + 1);
      const analysis = analyze(slice, cfg);
      if (!analysis || analysis.direction === "WAIT") continue;
      const entry = analysis.entry || slice[i].close;
      const stop = analysis.stop;
      const target = analysis.target;
      if (stop == null || target == null) continue;
      const isBuy = analysis.direction === "BUY";
      const riskPct = isBuy ? ((entry - stop) / entry) * 100 : ((stop - entry) / entry) * 100;
      const rewardPct = isBuy ? ((target - entry) / entry) * 100 : ((entry - target) / entry) * 100;
      let result = "pending";
      let exitPrice = null;
      let pnlPct = 0;
      for (let j = i + 1; j < rows.length; j++) {
        const bar = rows[j];
        if (isBuy) {
          if (bar.high >= target) { result = "win"; exitPrice = target; pnlPct = rewardPct; break; }
          if (bar.low <= stop) { result = "loss"; exitPrice = stop; pnlPct = -riskPct; break; }
        } else {
          if (bar.low <= target) { result = "win"; exitPrice = target; pnlPct = rewardPct; break; }
          if (bar.high >= stop) { result = "loss"; exitPrice = stop; pnlPct = -riskPct; break; }
        }
      }
      if (result === "pending") { pnlPct = 0; }
      trades.push({
        date: slice[i].date, direction: analysis.direction, entry, stop, target,
        confidence: analysis.confidence, risk: analysis.risk, result, pnlPct, exitPrice,
      });
    }
    backtest.results = {
      trades,
      startDate: rows[100].date, endDate: rows[rows.length - 1].date,
    };
  } catch { }
  backtest.running = false;
  render();
}

async function runCompareBacktestImpl() {
  if (backtest.running || backtest.comparing) return;
  backtest.comparing = true;
  backtest.comparison = null;
  backtest.progress = "";
  render();
  try {
    const rows = await fetchBinanceRows(state.base, state.quote, "1d", 1000);
    if (rows.length < 120) { backtest.comparing = false; render(); return; }
    const defaultCfg = { threshold: 5, riskRewardRatio: 2.0, volumeMultiplier: 1.3, volatilityMedianMultiplier: 2.5, rsiBuyThreshold: 55, rsiSellThreshold: 45 };
    const customCfg = loadStrategyConfig();
    function runCfg(cfg) {
      const trades = [];
      for (let i = 100; i < rows.length; i++) {
        const slice = rows.slice(0, i + 1);
        const a = analyze(slice, cfg);
        if (!a || a.direction === "WAIT") continue;
        const entry = a.entry || slice[i].close;
        const stop = a.stop;
        const target = a.target;
        if (stop == null || target == null) continue;
        const isBuy = a.direction === "BUY";
        const riskPct = isBuy ? ((entry - stop) / entry) * 100 : ((stop - entry) / entry) * 100;
        const rewardPct = isBuy ? ((target - entry) / entry) * 100 : ((entry - target) / entry) * 100;
        let result = "pending";
        let pnlPct = 0;
        for (let j = i + 1; j < rows.length; j++) {
          const bar = rows[j];
          if (isBuy) {
            if (bar.high >= target) { result = "win"; pnlPct = rewardPct; break; }
            if (bar.low <= stop) { result = "loss"; pnlPct = -riskPct; break; }
          } else {
            if (bar.low <= target) { result = "win"; pnlPct = rewardPct; break; }
            if (bar.high >= stop) { result = "loss"; pnlPct = -riskPct; break; }
          }
        }
        if (result === "pending") pnlPct = 0;
        trades.push({ result, pnlPct });
      }
      return trades;
    }
    backtest.progress = "Default config...";
    render();
    await new Promise(r => setTimeout(r, 0));
    const defTrades = runCfg(defaultCfg);
    backtest.progress = "Custom config...";
    render();
    await new Promise(r => setTimeout(r, 0));
    const cstTrades = runCfg(customCfg);
    function metrics(trades) {
      const total = trades.length;
      const wins = trades.filter(t => t.result === "win");
      const losses = trades.filter(t => t.result === "loss");
      const wr = total > 0 ? Math.round((wins.length / total) * 100) : 0;
      const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t.pnlPct, 0) / wins.length : 0;
      const avgLoss = losses.length > 0 ? Math.abs(losses.reduce((s, t) => s + t.pnlPct, 0) / losses.length) : 0;
      const avgRR = avgLoss > 0 ? (avgWin / avgLoss).toFixed(1) : "0";
      const pf = losses.length > 0 ? (Math.abs(wins.reduce((s, t) => s + t.pnlPct, 0)) / Math.abs(losses.reduce((s, t) => s + t.pnlPct, 0))).toFixed(2) : (wins.length > 0 ? "∞" : "0");
      let eq = 0;
      let peak = -Infinity;
      let maxDD = 0;
      trades.forEach(t => { eq += t.pnlPct; if (eq > peak) peak = eq; const dd = peak - eq; if (dd > maxDD) maxDD = dd; });
      return { signals: total, winRate: wr + "%", avgRR, profitFactor: pf, maxDD: maxDD.toFixed(1) + "%" };
    }
    backtest.comparison = { default: metrics(defTrades), custom: metrics(cstTrades) };
  } catch {}
  backtest.comparing = false;
  render();
}

function renderPaperTrading() {
  const p = paperState;
  const totalPnl = p.balance - p.startingBalance;
  const pnlPct = p.startingBalance > 0 ? (totalPnl / p.startingBalance * 100) : 0;
  const wins = p.trades.filter(t => t.pnlPct > 0).length;
