<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex, Crypto & Gold Trading Ideas</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0b1117;color:#e6edf3;min-height:100vh;-webkit-font-smoothing:antialiased}
#root{max-width:1180px;margin:0 auto;padding:20px 24px 48px}
/* topbar */
.topbar{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px}
.topbar h1{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em;color:#f0f4f8}
.eyebrow{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#73808d;margin-bottom:2px}
.pair-controls{display:flex;align-items:center;gap:10px;background:#141c26;padding:8px 12px;border-radius:10px;border:1px solid #1f2a36}
.select-wrap{position:relative;display:inline-flex;align-items:center;gap:6px}
.select-wrap span{font-size:.75rem;color:#8c98a5;white-space:nowrap}
.select-wrap select{appearance:none;background:transparent;border:none;color:#e6edf3;font-size:.85rem;font-weight:500;padding:4px 18px 4px 4px;cursor:pointer;font-family:inherit;outline:none;min-width:48px}
.select-wrap select:focus{color:#8dd7ff}
.select-wrap::after{content:"▾";position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:.6rem;color:#73808d;pointer-events:none}
.icon-button{background:transparent;border:1px solid #1f2a36;color:#8c98a5;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.icon-button:hover{background:#1f2a36;color:#e6edf3}
.icon-button:disabled{opacity:.3;cursor:not-allowed}
.icon-button:disabled:hover{background:transparent;color:#8c98a5}
/* summary grid */
.summary-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:720px){.summary-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.summary-grid{grid-template-columns:1fr}}
.signal-panel{background:#141c26;border-radius:12px;padding:16px 20px;border:1px solid #1f2a36;border-left:4px solid #73808d}
.signal-panel.buy{border-left-color:#2ea043}
.signal-panel.sell{border-left-color:#da3633}
.signal-panel.wait{border-left-color:#b58cff}
.panel-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#73808d;margin-bottom:4px}
.signal-row{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
.signal-row span{font-size:1.55rem;font-weight:700;letter-spacing:-.03em}
.buy .signal-row span{color:#3fb950}
.sell .signal-row span{color:#f85149}
.wait .signal-row span{color:#b58cff}
.signal-row small{color:#8c98a5;font-size:.8rem;font-weight:500}
.signal-panel p{font-size:.78rem;color:#8c98a5;line-height:1.4}
.metric{background:#141c26;border-radius:12px;padding:16px 20px;border:1px solid #1f2a36;display:flex;flex-direction:column;gap:2px}
.metric span{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#73808d}
.metric strong{font-size:1.25rem;font-weight:600;color:#f0f4f8}
/* notices */
.notice{background:#141c26;border-radius:10px;padding:12px 18px;font-size:.78rem;color:#73808d;border:1px solid #1f2a36;margin-bottom:16px;line-height:1.5}
.notice.error{color:#f85149;border-color:#da3633}
.source-line{font-size:.7rem;color:#5c6a7a;margin-bottom:18px}
/* workspace */
.workspace{display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:24px}
@media(max-width:900px){.workspace{grid-template-columns:1fr}}
.chart-panel{background:#10171f;border-radius:12px;border:1px solid #1f2a36;padding:18px}
.chart-panel .section-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.chart-panel .section-head span{font-size:.78rem;color:#5c6a7a}
.chart-panel .section-head h2{font-size:1.1rem;font-weight:600}
#priceChart{width:100%;height:460px;display:block;border-radius:6px}
.idea-panel{background:#141c26;border-radius:12px;padding:18px;border:1px solid #1f2a36;display:flex;flex-direction:column;gap:16px}
.section-head.compact h2{font-size:1rem;font-weight:600}
.levels{display:flex;flex-direction:column;gap:4px}
.level{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0b1117;border-radius:8px;font-size:.82rem}
.level span{color:#8c98a5}
.level strong{color:#f0f4f8;font-weight:600;font-variant-numeric:tabular-nums}
.checks{display:flex;flex-direction:column;gap:6px}
.check{display:flex;align-items:flex-start;gap:8px;font-size:.77rem;color:#8c98a5;line-height:1.4;padding:6px 8px;border-radius:6px;background:#0e151e}
.check span{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;margin-top:1px}
.check.ok span{background:#1a3a2a;color:#3fb950}
.check.bad span{background:#3a1a1a;color:#f85149}
/* signal history */
.history-section,.dashboard-section{margin-top:8px}
.stats-bar{display:flex;flex-wrap:wrap;gap:16px;padding:10px 16px;background:#0e151e;border:1px solid #1f2a36;border-radius:10px;margin-bottom:8px;font-size:.75rem}
.stat-item{display:flex;gap:6px;align-items:baseline}
.stat-item span{color:#5c6a7a}
.stat-item strong{color:#f0f4f8;font-weight:600;font-variant-numeric:tabular-nums}
.stat-item .stat-win{color:#3fb950}
.stat-item .stat-loss{color:#f85149}
.stat-item .stat-pending{color:#73808d}
.history-toggle,.backtest-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:#141c26;border:1px solid #1f2a36;border-radius:12px;padding:14px 20px;cursor:pointer;font-family:inherit;color:#e6edf3;transition:background .15s}
.history-toggle:hover{background:#1a2533}
.history-toggle-left{display:flex;align-items:center;gap:12px}
.history-toggle-left h3{font-size:.95rem;font-weight:600}
.history-count{background:#1f2a36;color:#8c98a5;font-size:.7rem;padding:2px 10px;border-radius:20px;font-weight:500}
.history-toggle .arrow{color:#73808d;font-size:.75rem;transition:transform .2s}
.history-toggle.open .arrow{transform:rotate(180deg)}
.history-body{border:1px solid #1f2a36;border-top:none;border-radius:0 0 12px 12px;overflow:hidden;display:none}
.history-body.open{display:block}
.history-header{display:grid;grid-template-columns:100px 80px 70px 60px 70px 50px 55px 1fr;gap:4px;padding:10px 16px;background:#0e151e;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#5c6a7a;border-bottom:1px solid #1f2a36}
.history-scroll{max-height:500px;overflow-y:auto}
.history-scroll::-webkit-scrollbar{width:5px}
.history-scroll::-webkit-scrollbar-track{background:transparent}
.history-scroll::-webkit-scrollbar-thumb{background:#1f2a36;border-radius:3px}
.history-entry{border-bottom:1px solid #0e151e;cursor:pointer;transition:background .1s}
.history-entry:hover{background:#0e151e}
.history-entry:last-child{border-bottom:none}
.history-summary{display:grid;grid-template-columns:100px 80px 70px 60px 70px 50px 55px 1fr;gap:4px;padding:10px 16px;align-items:center;font-size:.8rem}
.history-summary .h-time{color:#5c6a7a;font-size:.75rem;font-variant-numeric:tabular-nums}
.history-summary .h-pair{color:#8c98a5;font-weight:500;font-size:.75rem}
.history-summary .h-dir{font-weight:700;font-size:.78rem}
.history-summary .h-dir.buy{color:#3fb950}
.history-summary .h-dir.sell{color:#f85149}
.history-summary .h-dir.wait{color:#b58cff}
.history-summary .h-conf{color:#f0f4f8;font-weight:600;font-variant-numeric:tabular-nums}
.history-summary .h-risk{font-size:.72rem;padding:2px 8px;border-radius:10px;background:#1f2a36;color:#8c98a5;text-align:center}
.history-summary .h-risk.valid{background:#1a3a2a;color:#3fb950}
.history-summary .h-vol{color:#8c98a5;font-variant-numeric:tabular-nums;font-size:.75rem}
.history-summary .h-expand{color:#5c6a7a;font-size:.65rem;text-align:right}
.history-summary .h-result{font-size:.68rem;font-weight:600;text-align:center}
.history-summary .h-result.win{color:#3fb950}
.history-summary .h-result.loss{color:#f85149}
.history-summary .h-result.pending{color:#73808d}
.history-summary .h-delete{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.8rem;padding:2px 6px;border-radius:4px;font-family:inherit;line-height:1;transition:color .15s,background .15s}
.history-summary .h-delete:hover{color:#f85149;background:#3a1a1a}
.history-detail{padding:14px 16px 16px;background:#0b1117;display:none;border-top:1px solid #1f2a36}
.history-detail.open{display:block}
.history-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:12px}
.history-detail-grid .hd-item{display:flex;justify-content:space-between;font-size:.8rem;padding:4px 0;border-bottom:1px solid #0e151e}
.history-detail-grid .hd-item span:first-child{color:#5c6a7a}
.history-detail-grid .hd-item span:last-child{color:#e6edf3;font-weight:500;font-variant-numeric:tabular-nums}
.history-detail-reasons{margin-top:6px}
.history-detail-reasons p{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#5c6a7a;margin-bottom:6px}
.history-detail-reasons .hd-reason{font-size:.75rem;color:#8c98a5;padding:3px 0;display:flex;align-items:center;gap:8px}
.hd-reason .hd-r-icon{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0}
.hd-reason .hd-r-icon.ok{background:#1a3a2a;color:#3fb950}
.hd-reason .hd-r-icon.bad{background:#3a1a1a;color:#f85149}
.history-empty{padding:30px 20px;text-align:center;color:#5c6a7a;font-size:.85rem}
.history-actions{display:flex;gap:8px;padding:10px 16px;background:#0e151e;border-top:1px solid #1f2a36;justify-content:flex-end}
.history-actions button{background:#1f2a36;border:none;color:#8c98a5;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:inherit;transition:background .15s}
.history-actions button:hover{background:#2a3848;color:#e6edf3}
/* scan button */
.scan-button{display:inline-flex;align-items:center;gap:6px;background:#1a2533;border:1px solid #1f2a36;color:#8c98a5;padding:6px 14px 6px 10px;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .2s;white-space:nowrap}
.scan-button:hover{background:#1f2a36;color:#e6edf3}
.scan-button .dot{width:7px;height:7px;border-radius:50%;background:#5c6a7a;transition:background .3s}
.scan-button .dot.active{background:#3fb950;box-shadow:0 0 6px rgba(63,185,80,.4)}
.scan-button .dot.active.pulse{animation:pulse 1.5s ease-in-out infinite}
.scan-button.active{background:#0f2a1a;border-color:#2ea043;color:#3fb950}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.no-select{-webkit-user-select:none;user-select:none}
/* overview grid */
.overview-section{margin-bottom:16px}
.overview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.overview-head h3{font-size:1rem;font-weight:600}
.ov-star{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.85rem;padding:0;line-height:1;font-family:inherit;transition:color .15s}
.ov-star.active{color:#f0c35a}
.ov-star:hover{color:#f0c35a}
.ov-alert-btn{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.72rem;padding:1px 4px;border-radius:3px;font-family:inherit;line-height:1}
.ov-alert-btn:hover{background:#1f2a36;color:#e6edf3}
.ov-card{align-items:stretch}
.ov-card-top{display:flex;justify-content:space-between;align-items:center}
/* alerts section */
.alerts-section{margin-bottom:12px}
.alerts-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.alerts-head h4{font-size:.85rem;font-weight:600}
.alerts-grid{display:flex;flex-wrap:wrap;gap:6px}
.alert-chip{display:flex;align-items:center;gap:6px;background:#141c26;border:1px solid #1f2a36;border-radius:6px;padding:4px 10px;font-size:.72rem;color:#8c98a5}
.alert-chip strong{color:#f0f4f8}
.alert-chip-rm{background:none;border:none;color:#5c6a7a;cursor:pointer;font-size:.7rem;padding:0 2px;line-height:1;font-family:inherit}
.alert-chip-rm:hover{color:#f85149}
/* perf chart */
.perf-section{margin-bottom:12px;background:#0e151e;border:1px solid #1f2a36;border-radius:10px;padding:10px 14px}
.perf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.perf-head h4{font-size:.8rem;font-weight:600;color:#e6edf3}
.perf-head span{font-size:.68rem;color:#5c6a7a}
.overview-head .ov-progress{font-size:.72rem;color:#73808d}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px}
.ov-card{background:#141c26;border:1px solid #1f2a36;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:1px;border-left:3px solid #73808d;transition:opacity .3s}
.ov-card.buy{border-left-color:#2ea043}
.ov-card.sell{border-left-color:#da3633}
.ov-card.wait{border-left-color:#b58cff}
.ov-card.loading{opacity:.5}
.ov-pair{font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:#73808d}
.ov-signal{font-size:.85rem;font-weight:700}
.ov-card.buy .ov-signal{color:#3fb950}
.ov-card.sell .ov-signal{color:#f85149}
.ov-card.wait .ov-signal{color:#b58cff}
.ov-meta{font-size:.68rem;color:#8c98a5;display:flex;justify-content:space-between;gap:2px}
.chg-up{color:#3fb950}
.chg-down{color:#f85149}
@media(max-width:640px){.overview-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
@media(max-width:640px){
  #root{padding:12px 12px 32px}
  .topbar h1{font-size:1.15rem}
  .pair-controls{gap:6px;padding:6px 8px;flex-wrap:wrap}
  .select-wrap select{font-size:.78rem;min-width:36px;padding:2px 14px 2px 2px}
  .signal-row span{font-size:1.2rem}
  .signal-panel{padding:12px 14px}
  .metric{padding:12px 14px}
  .metric strong{font-size:1.05rem}
}
@media(max-width:700px){
  .history-header{display:none}
  .history-summary{grid-template-columns:1fr auto;gap:2px 8px;padding:8px 12px}
  .history-summary .h-time{grid-column:1}
  .history-summary .h-pair{grid-column:1}
  .history-summary .h-dir{grid-row:1;grid-column:2;text-align:right}
  .history-summary .h-result{grid-row:1;grid-column:2;text-align:right;position:relative;top:-14px;font-size:.6rem}
  .history-summary .h-conf{grid-row:2;grid-column:2;text-align:right}
  .history-summary .h-risk{grid-row:3;grid-column:2;text-align:right}
  .history-summary .h-vol{display:none}
  .history-summary .h-expand{grid-column:1;text-align:left;color:#5c6a7a}
  .history-summary .h-delete{position:relative;top:-8px;font-size:.7rem}
  .history-detail-grid{grid-template-columns:1fr}
  .chart-panel{padding:10px}
  #priceChart{height:280px}
}
@media(max-width:480px){
  .pair-controls .icon-button{width:28px;height:28px;font-size:.85rem}
  .scan-button{font-size:.7rem;padding:4px 8px 4px 6px}
}
.positions-section{border:1px solid #1f2a36;border-radius:10px;padding:12px;margin-bottom:10px}
.positions-section.closed{opacity:.7}
.positions-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.positions-head h4{font-size:.82rem;font-weight:600}
.positions-head span{background:#1f2a36;padding:1px 8px;border-radius:8px;font-size:.72rem;color:#8c98a5}
.pos-row{border:1px solid #1f2a36;border-radius:8px;padding:8px 10px;margin-bottom:6px;background:#0e151e}
.pos-buy{border-left:3px solid #3fb950}
.pos-sell{border-left:3px solid #f85149}
.pos-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.pos-pair{font-size:.72rem;font-weight:700;text-transform:uppercase}
.pos-dir{font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:700}
.pos-buy .pos-dir{color:#3fb950;background:rgba(63,185,80,.12)}
.pos-sell .pos-dir{color:#f85149;background:rgba(248,81,73,.12)}
.pos-profit{color:#3fb950}
.pos-loss{color:#f85149}
.pos-btn{background:#1f2a36;border:none;color:#8c98a5;cursor:pointer;font-size:.65rem;padding:2px 8px;border-radius:4px}
.pos-btn:hover{background:#2a384a;color:#e6edf3}
.pos-meta{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:6px;font-size:.65rem;color:#8c98a5}
.pos-meta span{white-space:nowrap}
.h-trade-btn{background:transparent;border:1px solid #2a384a;color:#73808d;cursor:pointer;font-size:.6rem;padding:0 5px;border-radius:3px;margin-left:2px;vertical-align:middle}
.h-trade-btn[disabled]{opacity:.3;cursor:default}
.h-trade-btn:hover:not([disabled]){border-color:#8c98a5;color:#e6edf3}
.hd-trade-btn{display:block;margin:8px auto 0;background:#1f2a36;border:none;color:#8dd7ff;cursor:pointer;font-size:.72rem;padding:6px 14px;border-radius:6px}
.hd-trade-btn:hover{background:#2a384a;color:#e6edf3}
.tf-row{display:flex;gap:4px;padding:6px 12px;justify-content:center}
.tf-btn{background:transparent;border:1px solid #1f2a36;color:#5c6a7a;font-size:.65rem;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:inherit;letter-spacing:.02em}
.tf-btn.active{background:#1a2533;border-color:#394757;color:#e6edf3}
.tf-btn.disabled{opacity:.35;cursor:not-allowed}
.tf-btn:not(.disabled):hover{border-color:#394757}
</style>

<body>
<div id="root"></div>
<script>
const currencies = ["XAU", "BTC", "ETH", "SOL", "XRP", "ADA", "DOGE", "DOT", "LINK", "AVAX", "EUR", "USD", "GBP", "JPY", "AUD", "CAD", "CHF", "NZD", "SGD"];
const names = {
  XAU: "Gold",
  BTC: "Bitcoin",
  ETH: "Ethereum",
  SOL: "Solana",
  XRP: "Ripple",
  ADA: "Cardano",
  DOGE: "Dogecoin",
  DOT: "Polkadot",
  LINK: "Chainlink",
  AVAX: "Avalanche",
  EUR: "Euro",
  USD: "US Dollar",
  GBP: "British Pound",
  JPY: "Japanese Yen",
  AUD: "Australian Dollar",
  CAD: "Canadian Dollar",
  CHF: "Swiss Franc",
  NZD: "New Zealand Dollar",
  SGD: "Singapore Dollar",
};

const nonFiat = new Set(["XAU", "BTC", "ETH", "SOL", "XRP", "ADA", "DOGE", "DOT", "LINK", "AVAX"]);
const binanceFiat = new Set(["EUR", "GBP", "AUD", "NZD"]);

const state = {
  base: "EUR",
  quote: "USD",
  rows: [],
  status: "loading",
  error: "",
  source: "",
  timeframe: "1d",
};

const autoScan = {
  enabled: false,
  intervalId: null,
  history: [],
  maxEntries: 50,
};

let positions = [];

function loadPositions() {
  try {
    const saved = localStorage.getItem("positions");
    if (saved) {
      positions = JSON.parse(saved);
      positions.forEach(p => p.openedAt = new Date(p.openedAt));
    }
  } catch {}
}

function savePositions() {
  try { localStorage.setItem("positions", JSON.stringify(positions)); } catch {}
}

function openTrade(pair, direction, entry, stop, target) {
  positions.push({ id: Date.now(), pair, direction, entry, stop, target, openedAt: new Date(), closedAt: null, exitPrice: null, pnl: null, pnlPct: null });
  savePositions();
  render();
}

function closeTrade(id, exitPrice) {
  const pos = positions.find(p => p.id === id);
  if (!pos) return;
  pos.closedAt = new Date();
  pos.exitPrice = exitPrice;
  const diff = exitPrice - pos.entry;
  pos.pnl = pos.direction === "BUY" ? diff : -diff;
  pos.pnlPct = pos.entry ? (pos.pnl / pos.entry) * 100 : 0;
  savePositions();
  render();
}

function deletePosition(id) {
  positions = positions.filter(p => p.id !== id);
  savePositions();
  render();
}

function getPosPrice(pos) {
  const r = multiScan.results[pos.pair];
  if (r && r.price != null) return r.price;
  return pos.entry;
}

const livePrice = {
  price: null,
  prevClose: null,
  timestamp: null,
  intervalId: null,
};

let webhookUrl = "";

function loadWebhook() { try { const s = localStorage.getItem("webhookUrl"); if (s) webhookUrl = s; } catch {} }
function saveWebhook() { try { localStorage.setItem("webhookUrl", webhookUrl); } catch {} }

async function sendWebhook(entry) {
  if (!webhookUrl) return;

async function checkAlerts() {
  if (alerts.length === 0) return;
  const pairs = [...new Set(alerts.map(a => a.pair))];
  const cache = {};
  for (const pair of pairs) {
    const [base, quote] = pair.split("/");
    try { const d = await fetchLivePrice(base, quote); if (d) cache[pair] = d.price; } catch {}
  }
  let changed = false;
  for (const alert of [...alerts]) {
    const current = cache[alert.pair];
    if (current == null) continue;
    const hit = alert.dir === "above" ? current >= alert.price : current <= alert.price;
    if (hit) {
      removeAlert(alert.id);
      changed = true;
      const dirLabel = alert.dir === "above" ? "above" : "below";
      playBeep();
      if ("Notification" in window && Notification.permission === "granted") {

          body: `Price is now ${dirLabel} target: $${formatPrice(current, alert.pair)}`,
          silent: true,
        });
      }
    }
  }
  if (changed) render();
}

function sma(values, period) {
  const out = Array(values.length).fill(null);
  let sum = 0;
  for (let i = 0; i < values.length; i++) {
    sum += values[i];
    if (i >= period) sum -= values[i - period];
    if (i >= period - 1) out[i] = sum / period;
  }
  return out;
}

function ema(values, period) {
  const out = Array(values.length).fill(null);
  const k = 2 / (period + 1);
  let sum = 0;
  for (let i = 0; i < values.length; i++) {
    if (i < period) sum += values[i];
    if (i === period - 1) out[i] = sum / period;
    if (i >= period) out[i] = values[i] * k + out[i - 1] * (1 - k);
  }
  return out;
}

function rsi(values, period = 14) {
  const out = Array(values.length).fill(null);
  if (values.length <= period) return out;
  let gain = 0;
  let loss = 0;
  for (let i = 1; i <= period; i++) {
    const move = values[i] - values[i - 1];
    if (move >= 0) gain += move;
    else loss -= move;
  }
  let avgGain = gain / period;
  let avgLoss = loss / period;
  out[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  for (let i = period + 1; i < values.length; i++) {
    const move = values[i] - values[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(move, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-move, 0)) / period;
    out[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return out;
}

function macd(values) {
  const fast = ema(values, 12);
  const slow = ema(values, 26);
  const line = values.map((_, i) => (fast[i] != null && slow[i] != null ? fast[i] - slow[i] : null));
  const firstValid = line.findIndex(v => v != null);
  if (firstValid === -1) return { line, signal: Array(values.length).fill(null), hist: Array(values.length).fill(null) };
  const validLine = line.slice(firstValid);
  const signalValid = ema(validLine, 9);
  const signal = line.map((v, i) => (i >= firstValid && i - firstValid < signalValid.length ? signalValid[i - firstValid] : null));
  const hist = line.map((v, i) => (v != null && signal[i] != null ? v - signal[i] : null));
  return { line, signal, hist };
}

function bollinger(values, period = 20, mult = 2) {
  const mid = sma(values, period);
  const upper = Array(values.length).fill(null);
  const lower = Array(values.length).fill(null);
  for (let i = period - 1; i < values.length; i++) {
    let variance = 0;
    for (let j = i - period + 1; j <= i; j++) variance += (values[j] - mid[i]) ** 2;
    const sd = Math.sqrt(variance / period);
    upper[i] = mid[i] + sd * mult;
    lower[i] = mid[i] - sd * mult;
  }
  return { mid, upper, lower };
}

function atr(rows, period = 14) {
  const ranges = rows.map((row, i) => {
    if (i === 0) return Math.abs(row.high - row.low);
    return Math.max(
      Math.abs(row.high - row.low),
      Math.abs(row.high - rows[i - 1].close),
      Math.abs(row.low - rows[i - 1].close),
    );
  });
  return sma(ranges, period);
}

function stdev(values) {
  const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
  return Math.sqrt(values.reduce((sum, value) => sum + (value - mean) ** 2, 0) / values.length);
}

function makeOhlc(date, close, previousClose) {
  const open = previousClose ?? close;
  const baseRange = Math.abs(close - open) || Math.abs(close) * 0.0025;
  const spread = Math.max(baseRange * 0.7, Math.abs(close) * 0.0012);
  return {
    date,
    open,
    high: Math.max(close, open) + spread,
    low: Math.min(close, open) - spread,
    close,
  };
}

async function fetchFxRows(base, quote) {
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - 180);
  const fmt = (date) => date.toISOString().slice(0, 10);
  const mid = new Date(start.getTime() + (end.getTime() - start.getTime()) / 2);
  const url1 = `https://api.frankfurter.dev/v1/${fmt(start)}..${fmt(mid)}?from=${base}&to=${quote}`;
  const url2 = `https://api.frankfurter.dev/v1/${fmt(mid)}..${fmt(end)}?from=${base}&to=${quote}`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 20000);
  try {
    const [res1, res2] = await Promise.all([
      fetch(url1, { signal: controller.signal }),
      fetch(url2, { signal: controller.signal }),
    ]);
    if (!res1.ok || !res2.ok) throw new Error("FX data not available for this pair.");
    const [data1, data2] = await Promise.all([res1.json(), res2.json()]);
    const allRates = { ...data1.rates, ...data2.rates };
    const dates = Object.keys(allRates).sort();
    return dates.map((date, index) => {
      const close = allRates[date][quote];
      const previous = index > 0 ? allRates[dates[index - 1]][quote] : close;
      return makeOhlc(date, close, previous);
    });
  } finally {
    clearTimeout(timer);
  }
}

function binanceSymbol(base, quote) {
  const q = quote === "USD" ? "USDT" : quote;
  return base === "XAU" ? `PAXG${q}` : `${base}${q}`;
}

async function fetchBinanceRows(base, quote, interval = "1d", limitOverride) {
  const symbol = binanceSymbol(base, quote);
  const limit = limitOverride || (interval === "1d" ? 200 : interval === "4h" ? 500 : interval === "1h" ? 500 : 200);
  const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
  if (!response.ok) throw new Error(`Live data unavailable for ${base}/${quote}.`);
  const data = await response.json();
  return data
    .map((k) => ({
      date: new Date(k[0]).toISOString().slice(0, 10),
      open: Number(k[1]),
      high: Number(k[2]),
      low: Number(k[3]),
      close: Number(k[4]),
      volume: Number(k[5]),
    }))
    .filter((row) => Number.isFinite(row.close));
}

async function fetchLivePrice(base, quote) {
  try {
    if (nonFiat.has(base) || (binanceFiat.has(base) && quote === "USD")) {
      const symbol = binanceSymbol(base, quote);
      const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
      if (!r.ok) return null;
      const d = await r.json();
      return { price: Number(d.lastPrice), change: Number(d.priceChangePercent) };
    }
    try {
      const r = await fetch(`https://api.frankfurter.dev/v1/latest?from=${base}&to=${quote}`);
      if (r.ok) { const d = await r.json(); return { price: d.rates[quote], change: null }; }
    } catch {}
    const r2 = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${base.toLowerCase()}.min.json`);
    if (r2.ok) { const d2 = await r2.json(); const rate = d2[base.toLowerCase()]?.[quote.toLowerCase()]; if (rate) return { price: rate, change: null }; }
    return null;
  } catch {
    return null;
  }
}

function seededRandom(seedText) {
  let seed = 2166136261;
  for (let i = 0; i < seedText.length; i++) {
    seed ^= seedText.charCodeAt(i);
    seed = Math.imul(seed, 16777619);
  }
  return () => {
    seed += 0x6d2b79f5;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function fallbackStartPrice(base, quote) {
  if (base === "XAU") return 4100;
  if (base === "BTC") return 65000;
  if (base === "ETH") return 3500;
  if (base === "SOL") return 150;
  if (base === "XRP") return 0.50;
  if (base === "ADA") return 0.45;
  if (base === "DOGE") return 0.12;
  if (base === "DOT") return 7.00;
  if (base === "LINK") return 15.00;
  if (base === "AVAX") return 35.00;
  if (quote === "JPY") return 160;
  if (base === "GBP") return 1.27;
  if (base === "EUR") return 1.08;
  if (base === "USD" && quote === "CHF") return 0.89;
  if (base === "AUD") return 0.66;
  if (base === "NZD") return 0.61;
  return 1.0;
}

function generateFallbackRows(base, quote) {
  const random = seededRandom(`${base}/${quote}`);
  const rows = [];
  const date = new Date();
  date.setDate(date.getDate() - 620);
  let close = fallbackStartPrice(base, quote);
  const dailyVol = base === "XAU" ? 0.008 : nonFiat.has(base) ? 0.025 : quote === "JPY" ? 0.0045 : 0.0038;
  const drift = base === "XAU" ? 0.00008 : nonFiat.has(base) ? 0.0005 : random() > 0.5 ? 0.00012 : -0.0001;

  while (rows.length < 430) {
    date.setDate(date.getDate() + 1);
    const day = date.getDay();
    if (day === 0 || day === 6) continue;
    const wave = Math.sin(rows.length / 18) * dailyVol * 0.42;
    const shock = (random() - 0.5) * dailyVol;
    const previous = close;
    close = Math.max(0.0001, close * (1 + drift + wave + shock));
    rows.push(makeOhlc(date.toISOString().slice(0, 10), close, previous));
  }
  return rows;
}

function analyze(rows) {
  if (rows.length < 80) return null;
  const closes = rows.map((row) => row.close);
  const sma20 = sma(closes, 20);
  const sma50 = sma(closes, 50);
  const sma200 = sma(closes, 200);
  const rsi14 = rsi(closes, 14);
  const macdData = macd(closes);
  const bands = bollinger(closes);
  const atr14 = atr(rows, 14);
  const merged = rows.map((row, i) => ({
    ...row,
    sma20: sma20[i],
    sma50: sma50[i],
    sma200: sma200[i],
    rsi: rsi14[i],
    macd: macdData.line[i],
    macdSignal: macdData.signal[i],
    macdHist: macdData.hist[i],
    bUpper: bands.upper[i],
    bLower: bands.lower[i],
    atr: atr14[i],
  }));

  const last = merged.at(-1);
  const prev = merged.at(-2);
  const volatilityPct = (last.atr / last.close) * 100;
  const recentVols = merged.slice(-30).filter(r => r.atr != null).map(r => (r.atr / r.close) * 100);
  recentVols.sort((a,b) => a-b);
  const medianVol = recentVols.length > 0 ? recentVols[Math.floor(recentVols.length / 2)] : 1.5;
  const volatilityOk = volatilityPct < Math.max(medianVol * 2.5, 0.3);
  const trendUp = last.sma20 > last.sma50 && last.close > last.sma50;
  const trendDown = last.sma20 < last.sma50 && last.close < last.sma50;
  const longTrendUp = last.sma200 != null && last.close > last.sma200;
  const longTrendDown = last.sma200 != null && last.close < last.sma200;
  const momentumUp = last.macd > last.macdSignal && last.macdHist > prev.macdHist;
  const momentumDown = last.macd < last.macdSignal && last.macdHist < prev.macdHist;
  const rsiBuyZone = last.rsi < 55;
  const rsiSellZone = last.rsi > 45;
  const notExtendedLong = last.bUpper == null || last.close < last.bUpper;
  const notExtendedShort = last.bLower == null || last.close > last.bLower;
  const priceRising = rows.length >= 5 && last.close > rows[rows.length - 5].close;
  const priceFalling = rows.length >= 5 && last.close < rows[rows.length - 5].close;
  const hasVolume = rows.some(r => Number.isFinite(r.volume) && r.volume > 0);
  const volSma = hasVolume ? sma(rows.map(r => r.volume), 20) : null;
  const volSurge = hasVolume && volSma && last.volume > volSma.at(-1) * 1.3;
  const recentCloses = closes.slice(-10);
  const recentRsis = rsi14.slice(-10).filter(v => v != null);
  const priceLowNow = Math.min(...recentCloses.slice(-5));
  const priceLowPrev = Math.min(...recentCloses.slice(0, 5));
  const priceHighNow = Math.max(...recentCloses.slice(-5));
  const priceHighPrev = Math.max(...recentCloses.slice(0, 5));
  const rsiLowNow = Math.min(...recentRsis.slice(-5));
  const rsiLowPrev = Math.min(...recentRsis.slice(0, 5));
  const rsiHighNow = Math.max(...recentRsis.slice(-5));
  const rsiHighPrev = Math.max(...recentRsis.slice(0, 5));
  const bullishDiv = priceLowNow < priceLowPrev && rsiLowNow > rsiLowPrev;
  const bearishDiv = priceHighNow > priceHighPrev && rsiHighNow < rsiHighPrev;

  const buyVotes = [trendUp, longTrendUp, momentumUp, rsiBuyZone, notExtendedLong, volatilityOk, priceRising];
  const sellVotes = [trendDown, longTrendDown, momentumDown, rsiSellZone, notExtendedShort, volatilityOk, priceFalling];
  const buyScore = buyVotes.filter(Boolean).length;
  const sellScore = sellVotes.filter(Boolean).length;
  const direction = buyScore >= 5 && buyScore > sellScore ? "BUY" : sellScore >= 5 && sellScore > buyScore ? "SELL" : "WAIT";
  const score = Math.max(buyScore, sellScore);
  const volBonus = volSurge ? 10 : 0;
  const divBonus = direction === "BUY" && bullishDiv ? 12 : direction === "SELL" && bearishDiv ? 12 : 0;
  const confidence = Math.min(100, Math.round((score / 7) * 100) + volBonus + divBonus);
  const risk = direction === "WAIT" || confidence < 72 || !volatilityOk ? "No trade" : "Low";
  const stopDistance = Math.max(last.atr * 1.15, last.close * 0.004);
  const targetDistance = stopDistance * 2.0;
  const entry = last.close;
  const stop = direction === "BUY" ? entry - stopDistance : entry + stopDistance;
  const target = direction === "BUY" ? entry + targetDistance : entry - targetDistance;
  const reasons = [
    { ok: trendUp || trendDown, text: trendUp ? "Short-term trend supports buying" : trendDown ? "Short-term trend supports selling" : "Trend is mixed" },
    { ok: momentumUp || momentumDown, text: momentumUp ? "MACD momentum confirms upside" : momentumDown ? "MACD momentum confirms downside" : "MACD momentum is not confirmed" },
    { ok: rsiBuyZone || rsiSellZone, text: `RSI is ${last.rsi.toFixed(0)}${last.rsi < 55 ? ", not overbought" : last.rsi > 45 ? ", not oversold" : ""}` },
    { ok: volatilityOk, text: volatilityOk ? "Volatility is acceptable for low-risk mode" : `Volatility ${volatilityPct.toFixed(2)}% exceeds pair's normal range` },
    { ok: priceRising || priceFalling, text: priceRising ? "Price trending up over last 5 bars" : priceFalling ? "Price trending down over last 5 bars" : "Price direction unclear over last 5 bars" },
    { ok: volSurge, text: volSurge ? "Above-average volume confirms the move" : "Volume does not confirm unusual activity" },
    { ok: bullishDiv || bearishDiv, text: bullishDiv ? "Bullish RSI divergence detected — momentum building" : bearishDiv ? "Bearish RSI divergence detected — momentum fading" : "No RSI divergence pattern" },
  ];
  return { chartRows: merged.slice(-140), last, direction, confidence, risk, entry, stop, target, reasons, buyScore, sellScore, volatilityPct };
}

function formatPrice(value, pair) {
  if (!Number.isFinite(value)) return "-";
  const digits = pair.includes("JPY") ? 3 : pair.includes("XAU") || nonFiat.has(pair.split("/")[0]) ? 2 : 5;
  return new Intl.NumberFormat("en-US", {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits,
    useGrouping: false,
  }).format(value);
}

function options(selected, exclude, disableNonFiat = false) {

    .map((currency) => `<option value="${currency}" ${currency === selected ? "selected" : ""} ${disableNonFiat && nonFiat.has(currency) ? "disabled" : ""}>${currency}</option>`)
    .join("");
}

      ${(() => { const open = positions.filter(p => !p.closedAt); if (open.length === 0) return ""; return `<section class="positions-section"><div class="positions-head"><h4>Open Positions</h4><span>${open.length}</span></div>${open.map(p => { const cp = getPosPrice(p); const pnl = p.direction === "BUY" ? cp - p.entry : p.entry - cp; const pnlPct = p.entry ? (pnl / p.entry) * 100 : 0; const pnlCls = pnl >= 0 ? "pos-profit" : "pos-loss"; return `<div class="pos-row ${p.direction === 'BUY' ? 'pos-buy' : 'pos-sell'}"><div class="pos-top"><span class="pos-pair">${p.pair}</span><span class="pos-dir">${p.direction}</span><span class="${pnlCls}">${pnl >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%</span><button class="pos-btn" data-close-pos="${p.id}">Close</button></div><div class="pos-meta"><span>Entry ${formatPrice(p.entry, p.pair)}</span><span>Cur ${formatPrice(cp, p.pair)}</span><span>Stop ${formatPrice(p.stop, p.pair)}</span><span>Target ${formatPrice(p.target, p.pair)}</span></div></div>`; }).join("")}</section>`; })()}

      ${(() => { const perfData = (() => { const sigs = autoScan.history.filter(e => e.result === "win" || e.result === "loss").reverse(); if (sigs.length < 2) return null; let cum = 0; return sigs.map(s => { cum += s.result === "win" ? 1 : -1; return { date: s.timestamp, value: cum }; }); })(); if (!perfData) return ""; const vals = perfData.map(p => p.value); const mx = Math.max(...vals); const mn = Math.min(...vals); const rng = mx - mn || 1; const w = 240; const h = 48; const xSt = w / (vals.length - 1); const pts = vals.map((v, i) => `${i * xSt},${h - ((v - mn) / rng) * (h - 6) - 3}`).join(" "); const color = vals[vals.length - 1] >= vals[0] ? "#3fb950" : "#f85149"; return `<section class="perf-section"><div class="perf-head"><h4>Performance</h4><span>${vals[vals.length - 1] >= 0 ? "+" : ""}${vals[vals.length - 1]} pts</span></div><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/></svg></section>`; })()}

y-toggle no-select" id="dashToggle"><div class="history-toggle-left"><h3>Signal Quality Dashboard</h3></div><span class="arrow">▾</span></button><div class="history-body" id="dashBody"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 0">${pairRows.length > 0 ? `<div><p style="font-size:.72rem;color:#8c98a5;margin-bottom:4px">Win rate by pair</p>${pairRows}</div>` : ""}${monthRows.length > 0 ? `<div><p style="font-size:.72rem;color:#8c98a5;margin-bottom:4px">Monthly win rate</p>${monthRows}</div>` : ""}</div></div></section>`; })()}

        <div class="hd-item"><span>Stop</span><span>${entry.stop != null ? formatPrice(entry.stop, entry.pair) : "-"}</span></div>
        <div class="hd-item"><span>Target</span><span>${entry.target != null ? formatPrice(entry.target, entry.pair) : "-"}</span></div>

        <div class="hd-item"><span>Risk mode</span><span>${entry.risk}</span></div>

        <div class="hd-item"><span>Buy score</span><span>${entry.buyScore}/7</span></div>

      </div>
      ${entry.reasons.length > 0 ? `<div class="history-detail-reasons"><p>Reasoning</p>${entry.reasons.map(r => `<div class="hd-reason"><span class="hd-r-icon ${r.ok ? 'ok' : 'bad'}">${r.ok ? '✓' : '!'}</span>${r.text}</div>`).join("")}</div>` : ""}

function signalCopy(analysis, status) {
  if (status === "loading") return "Loading market data and checking strict confirmation filters.";
  if (status === "error") return "No signal is produced when live market data cannot be loaded.";
  if (!analysis) return "Waiting for enough market history.";
  if (analysis.direction === "WAIT") return "No low-risk entry right now. The app waits until the setup is cleaner.";
  return `${analysis.direction} idea with controlled risk, confirmed trend, momentum and volatility filters.`;
}

function metric(label, value) {
  return `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`;
}

function level(label, value) {
  return `<div class="level"><span>${label}</span><strong>${value}</strong></div>`;
}

function updateScanUI() {
  const dot = document.getElementById("scanDot");
  const label = document.getElementById("scanLabel");
  const btn = document.getElementById("autoScanToggle");
  if (!dot || !label || !btn) return;
  if (autoScan.enabled) {
    dot.className = "dot active pulse";
    label.textContent = "Scanning";
    btn.classList.add("active");
  } else {
    dot.className = "dot";
    label.textContent = "Auto-scan";
    btn.classList.remove("active");
  }
}

function addSignalToHistory(pair, task) {
  const direction = task?.direction ?? "WAIT";
  const lastForPair = autoScan.history.find(e => e.pair === pair);
  if (lastForPair && lastForPair.direction === direction && lastForPair.result === "pending") {
    Object.assign(lastForPair, {
      timestamp: new Date(),
      confidence: task?.confidence ?? 0,
      risk: task?.risk ?? "No trade",
      entry: task?.entry ?? null,
      stop: task?.stop ?? null,
      target: task?.target ?? null,
      volatilityPct: task?.volatilityPct ?? 0,
      buyScore: task?.buyScore ?? 0,
      sellScore: task?.sellScore ?? 0,
      reasons: task?.reasons ?? [],
    });
    saveHistory();
    return false;
  }
  autoScan.history.unshift({
    id: Date.now(),
    timestamp: new Date(),
    pair,
    direction,
    confidence: task?.confidence ?? 0,
    risk: task?.risk ?? "No trade",
    entry: task?.entry ?? null,
    stop: task?.stop ?? null,
    target: task?.target ?? null,
    volatilityPct: task?.volatilityPct ?? 0,
    buyScore: task?.buyScore ?? 0,
    sellScore: task?.sellScore ?? 0,
    reasons: task?.reasons ?? [],
    result: "pending",
  });
  if (autoScan.history.length > autoScan.maxEntries) autoScan.history.length = autoScan.maxEntries;
  saveHistory();
  return true;
}

function recordSignal() {
  const task = state.rows.length > 0 ? analyze(state.rows) : null;
  const dir = task?.direction ?? "WAIT";
  const isNew = addSignalToHistory(`${state.base}/${state.quote}`, task);
  if (isNew && dir !== "WAIT") notifySignal({ direction: dir, pair: `${state.base}/${state.quote}`, confidence: task.confidence, risk: task.risk, entry: task.entry });
}

function saveHistory() {
  try { localStorage.setItem("signalHistory", JSON.stringify(autoScan.history)); } catch {}
}

function loadHistory() {
  try {
    const saved = localStorage.getItem("signalHistory");
    if (saved) {
      autoScan.history = JSON.parse(saved);
      autoScan.history.forEach(e => e.timestamp = new Date(e.timestamp));
      const cutoff = Date.now() - 14 * 24 * 60 * 60 * 1000;
      autoScan.history = autoScan.history.filter(e => e.result !== "pending" || (e.id || 0) > cutoff);
    }
  } catch {}
}

function playBeep() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch {}
}

function exportAllData() {
  const data = {
    exportedAt: new Date().toISOString(),
    history: autoScan.history,
    positions: positions.map(p => ({ ...p, openedAt: p.openedAt.toISOString(), closedAt: p.closedAt ? p.closedAt.toISOString() : null })),
    watchlist, alerts, scanPairs, webhookUrl,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "trading_dashboard_backup.json";
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}

function importAllData(json) {
  try {
    const data = JSON.parse(json);
    if (!data.history || !data.positions) return;
    autoScan.history = data.history.map(e => ({ ...e, timestamp: new Date(e.timestamp) }));
    positions = data.positions.map(p => ({ ...p, openedAt: new Date(p.openedAt), closedAt: p.closedAt ? new Date(p.closedAt) : null }));
    if (data.watchlist) watchlist = data.watchlist;
    if (data.alerts) alerts = data.alerts;
    if (data.scanPairs) { scanPairs = data.scanPairs; saveScanConfig(); }
    if (data.webhookUrl != null) { webhookUrl = data.webhookUrl; saveWebhook(); }

  } catch {}
}

function calcStats() {
  const signals = autoScan.history.filter(e => e.direction !== "WAIT" && e.result !== "pending");
  const total = signals.length;
  const wins = signals.filter(e => e.result === "win").length;
  const losses = signals.filter(e => e.result === "loss").length;
  const winRate = total > 0 ? Math.round((wins / total) * 100) : 0;
  let streak = 0;
  let streakType = "";
  for (let i = 0; i < signals.length; i++) {
    if (signals[i].result === "win") { if (streakType === "loss") break; streakType = "win"; streak++; }
    else if (signals[i].result === "loss") { if (streakType === "win") break; streakType = "loss"; streak++; }
    else break;
  }
  return { total, wins, losses, winRate, streak, streakType };
}

async function runBacktestImpl() {
  if (backtest.running) return;
  backtest.running = true;
  backtest.results = null;
  backtest.progress = "";
  render();
  try {
    const rows = await fetchBinanceRows(state.base, state.quote, "1d", 1000);
    if (rows.length < 120) { backtest.running = false; render(); return; }
    const trades = [];
    for (let i = 100; i < rows.length; i++) {
      backtest.progress = `${i - 99}/${rows.length - 100}`;
      if (i % 50 === 0) { await new Promise(r => setTimeout(r, 0)); render(); }
      const slice = rows.slice(0, i + 1);
      const analysis = analyze(slice);
      if (!analysis || analysis.direction === "WAIT") continue;
      const entry = analysis.entry || slice[i].close;
      const stop = analysis.stop;
      const target = analysis.target;
      if (stop == null || target == null) continue;
      const isBuy = analysis.direction === "BUY";
      const riskPct = isBuy ? ((entry - stop) / entry) * 100 : ((stop - entry) / entry) * 100;
      const rewardPct = isBuy ? ((target - entry) / entry) * 100 : ((entry - target) / entry) * 100;
      let result = "pending";
      let exitPrice = null;
      let pnlPct = 0;
      for (let j = i + 1; j < rows.length; j++) {
        const bar = rows[j];
        if (isBuy) {
          if (bar.high >= target) { result = "win"; exitPrice = target; pnlPct = rewardPct; break; }
          if (bar.low <= stop) { result = "loss"; exitPrice = stop; pnlPct = -riskPct; break; }
        } else {
          if (bar.low <= target) { result = "win"; exitPrice = target; pnlPct = rewardPct; break; }
          if (bar.high >= stop) { result = "loss"; exitPrice = stop; pnlPct = -riskPct; break; }
        }
      }
      if (result === "pending") { pnlPct = 0; }
      trades.push({
        date: slice[i].date, direction: analysis.direction, entry, stop, target,
        confidence: analysis.confidence, risk: analysis.risk, result, pnlPct, exitPrice,
      });
    }
    backtest.results = {
      trades,
      startDate: rows[100].date, endDate: rows[rows.length - 1].date,
    };
  } catch { }
  backtest.running = false;
  render();
}

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => { renderPending = false; render(); });
}

async function scanPairForOverview(pair) {
  const [base, quote] = pair.split("/");
  try {
    multiScan.results[pair] = { loading: true, direction: "WAIT", confidence: 0, price: null };
    scheduleRender();
    const rows = (nonFiat.has(base) || (binanceFiat.has(base) && quote === "USD")) ? await fetchBinanceRows(base, quote) : await fetchFxRows(base, quote);
    const analysis = rows.length >= 80 ? analyze(rows) : null;
    let mtfConf = 0;
    if (analysis && analysis.direction !== "WAIT" && (nonFiat.has(base) || (binanceFiat.has(base) && quote === "USD"))) {
      try {
        const rows4h = await fetchBinanceRows(base, quote, "4h");
        const a4h = rows4h.length >= 80 ? analyze(rows4h) : null;
        if (a4h) mtfConf = a4h.direction === analysis.direction ? 15 : a4h.direction !== "WAIT" ? -20 : 0;
      } catch {}
    }
    const conf = Math.min(100, Math.max(0, (analysis?.confidence ?? 0) + mtfConf));
    const task = analysis ? { direction: analysis.direction, confidence: conf, risk: analysis.risk, entry: analysis.entry, stop: analysis.stop, target: analysis.target, volatilityPct: analysis.volatilityPct, buyScore: analysis.buyScore, sellScore: analysis.sellScore, reasons: analysis.reasons } : null;
    const isNew = addSignalToHistory(pair, task);
    const lastRow = rows.at(-1);
    const price = lastRow ? lastRow.close : null;
    const change = rows.length >= 2 ? ((rows[rows.length - 1].close - rows[rows.length - 2].close) / rows[rows.length - 2].close) * 100 : null;
    multiScan.results[pair] = {
      loading: false, direction: analysis?.direction ?? "WAIT", confidence: conf,
      risk: analysis?.risk ?? "", volatilityPct: analysis?.volatilityPct ?? 0, price, change,
      entry: analysis?.entry, stop: analysis?.stop, target: analysis?.target,
    };
    if (isNew && task && task.direction !== "WAIT") notifySignal({ direction: task.direction, pair, confidence: task.confidence, risk: task.risk, entry: task.entry });
  } catch {
    multiScan.results[pair] = { loading: false, direction: "WAIT", confidence: 0, price: null };
  }
  scheduleRender();
}

async function scanAllPairs() {
  if (multiScan.scanning) return;
  multiScan.scanning = true;
  multiScan.results = {};
  render();
  const fast = scanPairs.filter(p => nonFiat.has(p.split("/")[0]) || (binanceFiat.has(p.split("/")[0]) && p.split("/")[1] === "USD"));
  const slow = scanPairs.filter(p => !fast.includes(p));
  multiScan.progress = `0/${scanPairs.length}`;
  render();
  if (fast.length > 0) { const limit = 3; for (let i = 0; i < fast.length; i += limit) { multiScan.progress = `${i}/${scanPairs.length}`; scheduleRender(); await Promise.all(fast.slice(i, i + limit).map(p => scanPairForOverview(p))); } }
  for (let i = 0; i < slow.length; i++) {
    if (!multiScan.scanning) break;
    multiScan.progress = `${fast.length + i}/${scanPairs.length}`;
    scheduleRender();
    await scanPairForOverview(slow[i]);
  }
  multiScan.scanning = false;
  multiScan.progress = "";
  render();
}

async function verifySignals() {
  const pending = autoScan.history.filter(e => e.direction !== "WAIT" && e.result === "pending" && e.stop != null && e.target != null);
  if (pending.length === 0) return;
  const pairs = [...new Set(pending.map(e => e.pair))];
  const priceCache = {};
  for (const pair of pairs) {
    const [base, quote] = pair.split("/");
    try {
      const data = await fetchLivePrice(base, quote);
      if (data) priceCache[pair] = data.price;
    } catch {}
  }
  const now = Date.now();
  let changed = false;
  for (const entry of pending) {
    const current = priceCache[entry.pair];
    if (current == null) continue;
    const age = now - (entry.id || now);
    const stale = age > 7 * 24 * 60 * 60 * 1000;
    if (entry.direction === "BUY") {
      entry.result = current >= entry.target ? "win" : current <= entry.stop ? "loss" : stale ? ((current - entry.entry) / entry.entry) * 100 > 0.3 ? "win" : "loss" : "pending";
    } else {
      entry.result = current <= entry.target ? "win" : current >= entry.stop ? "loss" : stale ? ((current - entry.entry) / entry.entry) * 100 < -0.3 ? "win" : "loss" : "pending";
    }
    if (entry.result !== "pending") changed = true;
  }
  if (changed) { saveHistory(); render(); }
}

let ws = null;
function connectWS() {
  const binancePairs = scanPairs.filter(p => nonFiat.has(p.split("/")[0]) || (binanceFiat.has(p.split("/")[0]) && p.split("/")[1] === "USD"));
  if (binancePairs.length === 0) return;
  const streams = binancePairs.map(p => { const [b, q] = p.split("/"); return `${binanceSymbol(b, q).toLowerCase()}@ticker`; }).join("/");
  try {
    ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (!msg.data) return;
        const sym = msg.data.s;
        const price = Number(msg.data.c);
        const change = Number(msg.data.P);
        const pair = binancePairs.find(p => binanceSymbol(p.split("/")[0], p.split("/")[1]) === sym);
        if (!pair) return;
        if (multiScan.results[pair]) { multiScan.results[pair].price = price; multiScan.results[pair].change = change; }
        const pId = `op-${pair.replace("/","-")}`;
        const cId = `oc-${pair.replace("/","-")}`;
        const pEl = document.getElementById(pId);
        if (pEl) pEl.textContent = formatPrice(price, pair);
        const cEl = document.getElementById(cId);
        if (cEl) { cEl.textContent = (change >= 0 ? "+" : "") + change.toFixed(1) + "%"; cEl.className = change >= 0 ? "chg-up" : "chg-down"; }
        document.querySelectorAll(".pos-row").forEach(row => {
          if (row.classList.contains("closed")) return;
          const pe = row.querySelector(".pos-pair");
          if (!pe || pe.textContent !== pair) return;
          const spans = row.querySelectorAll(".pos-meta span");
          if (spans.length >= 2) spans[1].textContent = "Cur " + formatPrice(price, pair);
          const pos = positions.find(p => !p.closedAt && p.pair === pair);
          if (!pos) return;
          const pnlVal = pos.direction === "BUY" ? price - pos.entry : pos.entry - price;
          const pnlPct = pos.entry ? (pnlVal / pos.entry) * 100 : 0;
          const hitStop = pos.direction === "BUY" ? price <= pos.stop : price >= pos.stop;
          const hitTarget = pos.direction === "BUY" ? price >= pos.target : price <= pos.target;
          if (hitStop || hitTarget) { closeTrade(pos.id, price); return; }
          const pnlEl = row.querySelector(".pos-profit, .pos-loss");
          if (pnlEl) { pnlEl.textContent = (pnlVal >= 0 ? "+" : "") + pnlPct.toFixed(2) + "%"; pnlEl.className = pnlVal >= 0 ? "pos-profit" : "pos-loss"; }
        });
      } catch {}
    };
    ws.onclose = () => { ws = null; setTimeout(connectWS, 5000); };
  } catch {}
}

async function updateOverviewPrices() {
  const pairs = scanPairs;
  if (pairs.length === 0) return;
  try {
    const crypto = pairs.filter(p => nonFiat.has(p.split("/")[0]));
    const binanceFx = pairs.filter(p => !nonFiat.has(p.split("/")[0]) && binanceFiat.has(p.split("/")[0]) && p.split("/")[1] === "USD");
    const fx = pairs.filter(p => !nonFiat.has(p.split("/")[0]) && !binanceFx.includes(p));
    const fxBases = [...new Set(fx.map(p => p.split("/")[0]))];
    const results = {};
    const allBinance = [...crypto, ...binanceFx];
    if (allBinance.length > 0) {
      const data = await Promise.all(allBinance.map(async (pair) => {
        const [base, quote] = pair.split("/");
        try {
          const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${binanceSymbol(base, quote)}`);
          if (!r.ok) return null;
          const d = await r.json();
          return { pair, price: Number(d.lastPrice), change: Number(d.priceChangePercent) };
        } catch { return null; }
      }));
      for (const d of data) { if (d) results[d.pair] = d; }
    }
    if (fxBases.length > 0) {
      const now = Date.now();
      let fxData = null;
      if (fxCache.rates && now - fxCache.time < 3600000) {
        fxData = fxCache.rates;
      } else {
        const fresh = await Promise.all(fxBases.map(async (base) => {
          try {
            const r = await fetch(`https://api.frankfurter.dev/v1/latest?from=${base}`);
            if (!r.ok) return null;
            const d = await r.json();
            return { base, rates: d.rates };
          } catch { return null; }
        }));
        fxCache = { rates: fresh, time: now };
        fxData = fresh;
      }
      for (const fd of fxData) {
        if (!fd) continue;
        for (const pair of fx) {
          const [b, q] = pair.split("/");
          if (b !== fd.base) continue;
          const rate = fd.rates[q];
          if (rate && multiScan.results[pair]) {
            results[pair] = { pair, price: rate, change: null };
          }
        }
      }
    }
    for (const pair of Object.keys(results)) {
      if (multiScan.results[pair]) {
        multiScan.results[pair].price = results[pair].price;
        if (results[pair].change != null) multiScan.results[pair].change = results[pair].change;
      }
    }
    for (const pair of Object.keys(results)) {
      const pEl = document.getElementById(`op-${pair.replace("/","-")}`);
      const d = multiScan.results[pair];
      if (pEl && d && d.price != null) pEl.textContent = formatPrice(d.price, pair);
      const cEl = document.getElementById(`oc-${pair.replace("/","-")}`);
      if (cEl && d && d.change != null) {
        cEl.textContent = (d.change >= 0 ? "+" : "") + d.change.toFixed(1) + "%";
        cEl.className = d.change >= 0 ? "chg-up" : "chg-down";
      }
    }
    document.querySelectorAll(".pos-row").forEach(row => {
      if (row.classList.contains("closed")) return;
      const pair = row.querySelector(".pos-pair")?.textContent;
      if (!pair) return;
      const d = multiScan.results[pair];
      if (!d || d.price == null) return;
      const spans = row.querySelectorAll(".pos-meta span");
      if (spans.length >= 2) spans[1].textContent = "Cur " + formatPrice(d.price, pair);
      const pos = positions.find(p => !p.closedAt && p.pair === pair);
      if (!pos) return;
      const price = d.price;
      const pnlVal = pos.direction === "BUY" ? price - pos.entry : pos.entry - price;
      const pnlPct = pos.entry ? (pnlVal / pos.entry) * 100 : 0;
      const hitStop = pos.direction === "BUY" ? price <= pos.stop : price >= pos.stop;
      const hitTarget = pos.direction === "BUY" ? price >= pos.target : price <= pos.target;
      if (hitStop || hitTarget) { closeTrade(pos.id, price); return; }
      const pnlEl = row.querySelector(".pos-profit, .pos-loss");
      if (pnlEl) {
        pnlEl.textContent = (pnlVal >= 0 ? "+" : "") + pnlPct.toFixed(2) + "%";
        pnlEl.className = pnlVal >= 0 ? "pos-profit" : "pos-loss";
      }
    });
  } catch (e) { console.warn("livePrice update error:", e); }
}

let scanCountdownId = null;

function startAutoScan() {
  if (autoScan.intervalId) return;
  autoScan.enabled = true;
  scanCountdown = 60;
  updateScanUI();
  (async () => {
    await loadDataOnly();
    recordSignal();
    render();
    await verifySignals();
    await checkAlerts();
    await updateLivePrice();
    if (livePrice.intervalId) clearInterval(livePrice.intervalId);
    livePrice.intervalId = setInterval(updateLivePrice, 30000);
  })();
  if (scanCountdownId) clearInterval(scanCountdownId);
  scanCountdownId = setInterval(() => { scanCountdown = Math.max(0, scanCountdown - 1); const el = document.getElementById("scanCountdown"); if (el) el.textContent = scanCountdown + "s"; }, 1000);
  autoScan.intervalId = setInterval(async () => {
    scanCountdown = 60;
    await loadDataOnly();
    recordSignal();
    render();
    await verifySignals();
    await checkAlerts();
  }, 60000);
}

function stopAutoScan() {
  if (autoScan.intervalId) {
    clearInterval(autoScan.intervalId);
    autoScan.intervalId = null;
  }
  if (scanCountdownId) { clearInterval(scanCountdownId); scanCountdownId = null; }
  if (livePrice.intervalId) {
    clearInterval(livePrice.intervalId);
    livePrice.intervalId = null;
    livePrice.price = null;
    livePrice.change = null;
    livePrice.timestamp = null;
  }
  autoScan.enabled = false;
  updateScanUI();
}

function toggleAutoScan() {
  if (autoScan.enabled) {
    stopAutoScan();
  } else {
    startAutoScan();
  }
}

async function loadDataOnly() {
  state.status = "loading";
  state.error = "";
  state.rows = [];
  state.source = "";
  try {
    const canUseBinance = nonFiat.has(state.base) || (binanceFiat.has(state.base) && state.quote === "USD");
    if (canUseBinance && state.timeframe !== "1d") {
      const tfLabel = state.timeframe === "4h" ? "4-hour" : state.timeframe === "1h" ? "1-hour" : "daily";
      state.rows = await fetchBinanceRows(state.base, state.quote, state.timeframe);
      state.source = `Binance ${names[state.base]}/${state.quote} ${tfLabel} prices`;
    } else if (canUseBinance && state.timeframe === "1d") {
      try {
        state.rows = await fetchBinanceRows(state.base, state.quote, "1d");
        state.source = `Binance ${names[state.base]}/${state.quote} daily prices`;
      } catch {
        state.rows = await fetchFxRows(state.base, state.quote);
        state.source = "Frankfurter.dev daily ECB reference rates";
      }
    } else {
      state.timeframe = "1d";
      state.rows = await fetchFxRows(state.base, state.quote);
      state.source = "Frankfurter.dev daily ECB reference rates";
    }
    if (state.rows.length < 80) throw new Error("Not enough history for strict signal mode.");
    state.status = "ready";
  } catch (error) {
    console.error(`[${state.base}/${state.quote}] Data fetch failed:`, error?.message || error);
    state.rows = generateFallbackRows(state.base, state.quote);
    state.source = "Offline demo data because live market data could not be reached";
    state.status = "ready";
    state.error = "Live data is unavailable in this browser session. The dashboard is using demo data, so do not trade this signal.";
  }
}

async function load() {
  state.status = "loading";
  state.error = "";
  state.rows = [];
  state.source = "";
  render();
  await loadDataOnly();
  recordSignal();
  render();
  await verifySignals();
  await checkAlerts();
  if (autoScan.enabled) updateLivePrice();
}

function drawChart(canvas, rows, pair) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const width = rect.width;
  const height = rect.height || 460;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.scale(dpr, dpr);
  const pad = { left: 62, right: 18, top: 18, bottom: 60 };
  const values = rows.flatMap((row) => [row.close, row.sma20, row.sma50, row.bUpper, row.bLower]).filter(Number.isFinite);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const y = (value) => pad.top + ((max - value) / (max - min || 1)) * (height - pad.top - pad.bottom);
  const x = (index) => pad.left + (index / (rows.length - 1 || 1)) * (width - pad.left - pad.right);
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = "#10171f";
  ctx.fillRect(0, 0, width, height);

  const vols = rows.map(r => r.volume).filter(v => Number.isFinite(v) && v > 0);
  const volMax = vols.length > 0 ? Math.max(...vols) : 1;
  const volH = 28;
  if (vols.length > 1) {
    rows.forEach((row, i) => {
      if (!Number.isFinite(row.volume) || row.volume <= 0) return;
      const vw = Math.max(1, (width - pad.left - pad.right) / rows.length - 1);
      const vx = x(i) - vw / 2;
      const vh = (row.volume / volMax) * volH;
      ctx.fillStyle = row.close >= row.open ? "#3fb950" : "#f85149";
      ctx.fillRect(vx, height - pad.bottom - vh + 4, vw, vh);
    });
    ctx.fillStyle = "#5a6a7a";
    ctx.font = "10px Inter, sans-serif";
    ctx.fillText("Volume", pad.left + 2, height - pad.bottom + 24);
  }

  ctx.strokeStyle = "#26313d";
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const yy = pad.top + (i / 4) * (height - pad.top - pad.bottom);
    ctx.beginPath();
    ctx.moveTo(pad.left, yy);
    ctx.lineTo(width - pad.right, yy);
    ctx.stroke();
    const label = max - (i / 4) * (max - min);
    ctx.fillStyle = "#8c98a5";
    ctx.font = "12px Inter, sans-serif";
    ctx.fillText(formatPrice(label, pair), 8, yy + 4);
  }
  drawLine(ctx, rows, x, y, "bUpper", "#394757", 1);
  drawLine(ctx, rows, x, y, "bLower", "#394757", 1);
  const swingLevels = findSwingLevels(rows, 80);
  swingLevels.forEach(level => {
    const yy = y(level.price);
    if (yy < pad.top || yy > height - pad.bottom) return;
    ctx.strokeStyle = level.type === "support" ? "rgba(63,185,80,0.35)" : "rgba(248,81,73,0.35)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(width - pad.right, yy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = level.type === "support" ? "rgba(63,185,80,0.6)" : "rgba(248,81,73,0.6)";
    ctx.font = "9px Inter, sans-serif";
    ctx.fillText(level.type === "support" ? "S" : "R", width - pad.right - 12, yy - 3);
  });
  drawLine(ctx, rows, x, y, "sma50", "#b58cff", 1.6);
  drawLine(ctx, rows, x, y, "sma20", "#f0c35a", 1.6);
  drawLine(ctx, rows, x, y, "close", "#8dd7ff", 2.6);
  ctx.fillStyle = "#8c98a5";
  ctx.fillText(rows[0].date, pad.left, height - 10);
  ctx.fillText(rows.at(-1).date, width - pad.right - 78, height - 10);
}

function drawLine(ctx, rows, x, y, key, color, width) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  let started = false;
  rows.forEach((row, index) => {
    if (!Number.isFinite(row[key])) return;
    if (!started) {
      ctx.moveTo(x(index), y(row[key]));
      started = true;
    } else {
      ctx.lineTo(x(index), y(row[key]));
    }
  });
  ctx.stroke();
}

function findSwingLevels(rows, lookback = 80) {
  const levels = [];
  const slice = rows.slice(-lookback);
  for (let i = 2; i < slice.length - 2; i++) {
    if (slice[i].high > slice[i-1].high && slice[i].high > slice[i-2].high &&
        slice[i].high > slice[i+1].high && slice[i].high > slice[i+2].high) {
      levels.push({ price: slice[i].high, type: "resistance" });
    }
    if (slice[i].low < slice[i-1].low && slice[i].low < slice[i-2].low &&
        slice[i].low < slice[i+1].low && slice[i].low < slice[i+2].low) {
      levels.push({ price: slice[i].low, type: "support" });
    }
  }
  const grouped = [];
  const threshold = (Math.max(...levels.map(l => l.price)) - Math.min(...levels.map(l => l.price))) * 0.02;
  for (const level of levels) {
    const close = grouped.find(g => Math.abs(g.price - level.price) / g.price < threshold);
    if (close) { close.count++; close.price = (close.price + level.price) / 2; } else { grouped.push({ ...level, count: 1 }); }
  }
  return grouped.filter(g => g.count >= 2).sort((a,b) => a.price - b.price).slice(-6);
}

function redrawChart() {
  const canvas = document.getElementById("priceChart");
  const analysis = state.rows.length > 0 ? analyze(state.rows) : null;
  if (canvas && analysis) {
    drawChart(canvas, analysis.chartRows, `${state.base}/${state.quote}`);
  }
}

let ssPoints = [];
let ssImg = null;

function ssUpload(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      ssImg = img;
      const canvas = document.getElementById("screenshotCanvas");
      canvas.style.display = "block";
      canvas.width = Math.min(img.width, 800);
      canvas.height = Math.min(img.height, 400);
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      document.getElementById("ssControls").style.display = "flex";
      ssPoints = [];
      document.getElementById("ssCount").textContent = "0 points";
      canvas.onmousedown = (ev) => {
        const rect = canvas.getBoundingClientRect();
        const x = (ev.clientX - rect.left) * (canvas.width / rect.width);
        const y = (ev.clientY - rect.top) * (canvas.height / rect.height);
        if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) return;
        ssPoints.push({ x, y });
        document.getElementById("ssCount").textContent = ssPoints.length + " points";
        const ctx2 = canvas.getContext("2d");
        ctx2.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx2.fillStyle = "#3fb950";
        ctx2.strokeStyle = "#3fb950";
        ctx2.lineWidth = 1.5;
        ctx2.beginPath();
        ssPoints.forEach((p, i) => { ctx2.arc(p.x, p.y, 3, 0, Math.PI * 2); if (i > 0) { ctx2.beginPath(); ctx2.moveTo(ssPoints[i-1].x, ssPoints[i-1].y); ctx2.lineTo(p.x, p.y); ctx2.stroke(); ctx2.beginPath(); ctx2.arc(p.x, p.y, 3, 0, Math.PI * 2); } ctx2.fill(); });
      };
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function ssAnalyze() {
  const min = Number(document.getElementById("ssMin").value);
  const max = Number(document.getElementById("ssMax").value);
  if (!ssImg || ssPoints.length < 5 || !isFinite(min) || !isFinite(max) || max <= min) { return; }
  const canvas = document.getElementById("screenshotCanvas");
  const range = max - min;
  const closes = ssPoints.map(p => max - (p.y / canvas.height) * range);
  const rows = closes.map((c, i) => ({
    date: new Date(Date.now() - (closes.length - 1 - i) * 86400000).toISOString().slice(0, 10),
    open: i > 0 ? closes[i-1] : c * 0.999,
    high: c * 1.002,
    low: c * 0.998,
    close: c,
  }));
  const analysis = rows.length >= 30 ? analyze(rows) : null;
  const el = document.getElementById("ssResult");
  if (!analysis) { el.innerHTML = "<span style='color:#f85149'>Need at least 30 points for analysis. Add more points along the chart line.</span>"; el.style.display = "block"; return; }
  const cls = analysis.direction.toLowerCase();
  const dirLabel = analysis.direction === "BUY" ? "🟢 BUY" : analysis.direction === "SELL" ? "🔴 SELL" : "⚪ WAIT";
  el.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong style="color:${cls === 'buy' ? '#3fb950' : cls === 'sell' ? '#f85149' : '#b58cff'}">${dirLabel}</strong><span style="font-size:.7rem;color:#8c98a5">${analysis.confidence}% confidence</span></div>
<div style="display:flex;flex-wrap:wrap;gap:4px 14px;font-size:.72rem;color:#8c98a5;margin-bottom:4px"><span>📈 Buy: ${analysis.buyScore}/7</span><span>📉 Sell: ${analysis.sellScore}/7</span><span>⚠ Risk: ${analysis.risk}</span><span>📊 Volatility: ${analysis.volatilityPct.toFixed(2)}%</span></div>
<div style="font-size:.68rem;color:#73808d;line-height:1.4">${analysis.reasons.map(r => `<span style="color:${r.ok ? '#3fb950' : '#f85149'}">${r.ok ? '✓' : '✗'}</span> ${r.text}`).join("<br>")}</div>`;
  el.style.display = "block";
}

function setupEvents() {
  root.addEventListener("input", (event) => {
    if (event.target.id === "webhookInput") {
      webhookUrl = event.target.value;
      saveWebhook();
    }
  });
  root.addEventListener("change", (event) => {
    if (event.target.id === "base") {
      state.base = event.target.value;
      if (nonFiat.has(state.base)) state.quote = "USD";
      load();
    }
    if (event.target.id === "quote") {
      state.quote = event.target.value;
      load();
    }
    if (event.target.dataset.scanPair) {
      toggleScanPair(event.target.dataset.scanPair);
    }
    if (event.target.id === "screenshotFile") {
      ssUpload(event.target.files[0]);
    }
    if (event.target.id === "importFile") {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => { importAllData(e.target.result); };
      reader.readAsText(file);
    }
  });

  root.addEventListener("click", (event) => {
    const target = event.target.closest("button");
    if (!target) {
      const entryRow = event.target.closest(".history-entry");
      if (entryRow) {
        const idx = entryRow.dataset.idx;
        const detail = document.getElementById(`hd-${idx}`);
        if (detail) {
          const isOpen = detail.classList.contains("open");
          document.querySelectorAll(".history-detail.open").forEach(el => el.classList.remove("open"));
          if (!isOpen) detail.classList.add("open");
        }
      }
      return;
    }

    if (target.dataset.del) {
      deleteHistoryEntry(Number(target.dataset.del));
      return;
    }
    if (target.dataset.star) {
      toggleWatchlist(target.dataset.star);
      return;
    }
    if (target.dataset.alert) {
      const pair = target.dataset.alert;
      const dir = confirm("Click OK for alert ABOVE price, Cancel for BELOW") ? "above" : "below";
      const price = prompt(`Set price alert for ${pair} (${dir === "above" ? "↑ above" : "↓ below"}):`);
      if (price && !isNaN(price)) setAlert(pair, price, dir);
      return;
    }
    if (target.dataset.rmAlert) {
      removeAlert(Number(target.dataset.rmAlert));
      return;
    }
    if (target.dataset.tf) {
      if (state.timeframe === target.dataset.tf) return;
      const ok = nonFiat.has(state.base) || (binanceFiat.has(state.base) && state.quote === "USD");
      if (ok) { state.timeframe = target.dataset.tf; load(); }
      else if (state.base !== state.quote) { loadDataOnly(); render(); }
      return;
    }
    if (target.id === "settingsToggle") {
      document.getElementById("screenshotPanel").style.display = "none";
      const panel = document.getElementById("settingsPanel");
      if (panel) panel.style.display = panel.style.display === "none" ? "flex" : "none";
      return;
    }
    if (target.id === "screenshotToggle") {
      document.getElementById("settingsPanel").style.display = "none";
      const panel = document.getElementById("screenshotPanel");
      if (panel) panel.style.display = panel.style.display === "none" ? "flex" : "none";
      return;
    }
    if (target.id === "soundToggle") {
      soundEnabled = !soundEnabled;
      target.textContent = soundEnabled ? "🔊" : "🔇";
      if (soundEnabled) playBeep();
      return;
    }
    if (target.id === "ssAnalyze") { ssAnalyze(); return; }
    if (target.id === "ssClear") {
      ssPoints = [];
      document.getElementById("ssCount").textContent = "0 points";
      document.getElementById("ssResult").style.display = "none";
      const canvas = document.getElementById("screenshotCanvas");
      if (ssImg) { const ctx = canvas.getContext("2d"); ctx.drawImage(ssImg, 0, 0, canvas.width, canvas.height); }
      return;
    }
    if (target.id === "testWebhook") {
      const inp = document.getElementById("webhookInput");
      if (inp) {
        webhookUrl = inp.value;
        saveWebhook();
        sendWebhook({ direction: "TEST", pair: "Webhook", confidence: 100, risk: "Test", entry: null, stop: null, target: null });
      }
      return;
    }
    if (target.id === "exportData") { exportAllData(); return; }
    if (target.dataset.trade) {
      const entry = autoScan.history.find(e => e.id === Number(target.dataset.trade));
      if (entry && entry.direction !== "WAIT") {
        openTrade(entry.pair, entry.direction, entry.entry, entry.stop, entry.target);
      }
      return;
    }
    if (target.dataset.tradeOv) {
      const pair = target.dataset.tradeOv;
      const r = multiScan.results[pair];
      if (r && r.direction !== "WAIT" && r.entry != null) {
        openTrade(pair, r.direction, r.entry, r.stop, r.target);
      }
      return;
    }
    if (target.dataset.closePos) {
      const id = Number(target.dataset.closePos);
      const exitPrice = prompt("Enter exit price:");
      if (exitPrice && !isNaN(exitPrice)) closeTrade(id, Number(exitPrice));
      return;
    }
    if (target.dataset.delPos) {
      deletePosition(Number(target.dataset.delPos));
      return;
    }
    if (target.id === "swap") {
      if (nonFiat.has(state.base)) return;
      [state.base, state.quote] = [state.quote, state.base];
      load();
    }
    if (target.id === "refresh") {
      load();
    }
    if (target.id === "autoScanToggle") {
      toggleAutoScan();
    }
    if (target.id === "toggleScanConfig") {
      multiScan.configOpen = !multiScan.configOpen;
      render();
    }
    if (target.id === "scanAll") {
      scanAllPairs();
    }
    if (target.id === "exportCSV") {
      exportCSV();
    }
    if (target.id === "clearHistory") {
      clearSignalHistory();
    }
    if (target.id === "runBacktest") { runBacktestImpl(); return; }
    if (target.id === "backtestToggle") {
      const body = document.getElementById("backtestBody");
      const toggle = document.getElementById(target.id);
      if (body) { body.classList.toggle("open"); toggle.classList.toggle("open"); }
      return;
    }
    if (target.id === "historyToggle" || target.id === "dashToggle") {
      const body = document.getElementById(target.id === "historyToggle" ? "historyBody" : "dashBody");
      const toggle = document.getElementById(target.id);
      const isOpen = body.classList.contains("open");
      if (isOpen) {
        body.classList.remove("open");
        toggle.classList.remove("open");
      } else {
        body.classList.add("open");
        toggle.classList.add("open");
      }
    }
  });
}

const resizeObserver = new ResizeObserver(() => {
  requestAnimationFrame(redrawChart);
});

function observeChartContainer() {
  const container = document.getElementById("chartContainer");
  if (container) resizeObserver.observe(container);
}

let soundEnabled = true;

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if (e.key === "r" || e.key === "R") { load(); return; }
  if (e.key === "s" || e.key === "S") { toggleAutoScan(); return; }
  if (e.key === "m" || e.key === "M") { soundEnabled = !soundEnabled; playBeep(); return; }
  if (e.key === "1") { const ok = nonFiat.has(state.base) || (binanceFiat.has(state.base) && state.quote === "USD"); if (ok) { state.timeframe = "1d"; load(); } return; }
  if (e.key === "4") { const ok = nonFiat.has(state.base) || (binanceFiat.has(state.base) && state.quote === "USD"); if (ok) { state.timeframe = "4h"; load(); } return; }
  if (e.key === "h" || e.key === "H") { const ok = nonFiat.has(state.base) || (binanceFiat.has(state.base) && state.quote === "USD"); if (ok) { state.timeframe = "1h"; load(); } return; }
});

loadHistory();
loadPositions();
loadWebhook();
setupEvents();
load();
connectWS();
startAutoScan();
setInterval(updateOverviewPrices, 10000);
setInterval(updateLivePrice, 15000);
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
